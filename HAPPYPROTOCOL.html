const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playFreq(f, d, v=0.1, type='sine') {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = type; o.frequency.value = f; g.gain.value = v;
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + d);
}
function playCorrectRhythm() {
    const now = audioCtx.currentTime;
    [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => {
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();

        g.gain.setValueAtTime(0.1, now + i * 0.08); g.gain.exponentialRampToValueAtTime(0.0001, now + i * 0.08 + 0.1);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(now + i * 0.08); o.stop(now + i * 0.08 + 0.1);
    });
}

let currentLevel = '', currentStep = 0, selectedPick = '';

/* --- 進行制御 --- */
function showMenu() {
    playFreq(880, 0.1);
    document.getElementById('opening-screen').style.display = 'none';
    document.getElementById('menu-screen').style.display = 'block';
}

function startGame(lv) {
    playFreq(1100, 0.1);
    currentLevel = lv; currentStep = 0;
    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById('game-ui').style.display = 'block';
    document.getElementById('sidebar').style.opacity = '1';
    document.getElementById('sidebar').style.pointerEvents = 'auto';
    initLadder(); updateView();
}

function initLadder() {
    const ladder = document.getElementById('money-ladder'); ladder.innerHTML = '';
    for (let i = moneyList.length - 1; i >= 0; i--) {
        const div = document.createElement('div'); div.id = `step-${i}`; div.className = 'money-step';
        div.innerHTML = `<span>STEP ${i+1}</span> <span>¥${moneyList[i]}</span>`; ladder.appendChild(div);
    }
}

function updateView() {
    if (currentStep >= 10) { showResult(moneyList[9]); return; }
    for (let i = 0; i < 10; i++) {
        const el = document.getElementById(`step-${i}`);
        el.className = 'money-step ' + (i === currentStep ? 'current-step' : (i < currentStep ? 'passed-step' : ''));
    }
    const data = quizData[currentLevel][currentStep];
    document.getElementById('question-box').innerText = data.q;
    ['A', 'B', 'C', 'D'].forEach(id => {
        const btn = document.getElementById('btn-' + id); btn.classList.remove('hidden-opt');
        document.getElementById('opt-' + id).innerText = data[id.toLowerCase()];
    });
}

/* --- モーダル制御 --- */
function openInfo(emoji, title, content, showClose = true) {
    document.getElementById('info-emoji').innerText = emoji;
    document.getElementById('info-title').innerText = title;
    document.getElementById('info-content').innerHTML = content;
    document.getElementById('info-footer').style.display = showClose ? 'block' : 'none';
    document.getElementById('info-modal').style.display = 'block';
}
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

/* --- 回答ロジック --- */
function askFinal(pick) {
    selectedPick = pick;
    playFreq(660, 0.05);
    document.getElementById('confirm-modal').style.display = 'block';
}
function confirmYes() {
    closeModal('confirm-modal');
    const correct = quizData[currentLevel][currentStep].ans;
    if (selectedPick === correct) {
        playCorrectRhythm();
        openInfo("💖", "正解！", "すごーい！その通りだにゃ♪", false);
        currentStep++;
        setTimeout(() => { closeModal('info-modal'); updateView(); }, 1800);
    } else {
        playFreq(220, 0.6, 0.2, 'sawtooth');
        openInfo("😨", "残念...", "ここまでだにゃ... また挑戦してね！", true);
        document.getElementById('info-close-btn').onclick = () => location.reload();
    }
}

/* --- ライフライン --- */
function useLifeline(type) {
    if (type === '50:50') {
        const correct = quizData[currentLevel][currentStep].ans;
        const options = ['A', 'B', 'C', 'D'].filter(opt => opt !== correct);
        for (let i = 0; i < 2; i++) {
            const target = options.splice(Math.floor(Math.random() * options.length), 1)[0];
            document.getElementById(`btn-${target}`).classList.add('hidden-opt');
        }
        document.getElementById('fifty-fifty').classList.add('used');
        openInfo("✨", "50:50 発動！", "選択肢が2つ消えたにゃ！チャンスだにゃ！");
    } 
    else if (type === 'phone') {
        const correct = quizData[currentLevel][currentStep].ans;
        document.getElementById('phone').classList.add('used');
        openInfo("💌", "メッセージ受信", `「たぶん答えは <b>${correct}</b> だと思うにゃ！信じるかはあなた次第...！」`);
    } 
    else if (type === 'audience') {
        document.getElementById('audience').classList.add('used');
        const correct = quizData[currentLevel][currentStep].ans;
        const rates = {A:5, B:5, C:5, D:5};
        rates[correct] = 70 + Math.floor(Math.random()*15);
        let graphHtml = '<div class="graph-container">';
        ['A','B','C','D'].forEach(opt => {
            graphHtml += `<div class="graph-row">
                <div class="graph-label">${opt}</div>
                <div class="graph-bar-bg"><div class="graph-bar-fill" style="width:${rates[opt]}%"></div></div>
                <div style="font-size:12px;">${rates[opt]}%</div>
            </div>`;
        });
        graphHtml += '</div>';
        openInfo("✨", "オーディエンスの結果", graphHtml);
    }
}

function walkAway() {
    if (currentStep === 0) return;
    document.getElementById('confirm-title').innerText = `¥${moneyList[currentStep-1]} を持って辞める？`;
    document.getElementById('confirm-yes-btn').onclick = () => showResult(moneyList[currentStep-1]);
    document.getElementById('confirm-modal').style.display = 'block';
}

function showResult(amount) {
    closeModal('confirm-modal');
    document.getElementById('game-ui').style.display = 'none';
    document.getElementById('sidebar').style.opacity = '0';
    document.getElementById('success-screen').style.display = 'block';
    document.getElementById('reward-display').innerText = `獲得実績: ¥${amount}💖`;
}
</script>
