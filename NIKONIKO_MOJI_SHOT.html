<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ニコニコ風弾幕ジェネレーター（12レーン・クロマキー完全対応版）</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Noto+Sans+JP:wght@900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; background-color: #222; overflow-x: hidden;
            font-family: sans-serif; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        #video-area {
            position: relative;
            width: 800px;
            height: 450px;
            background-color: #00ff00; /* クロマキー用純粋グリーン */
            box-shadow: 0 0 20px rgba(0,0,0,0.9);
            margin-top: 20px;
            overflow: hidden;
            max-width: 95vw;
            aspect-ratio: 16 / 9;
        }
        .comment {
            position: absolute;
            white-space: nowrap;
            color: #ffffff;
            font-weight: bold;
            line-height: 1;
            text-shadow:
                2px 2px 0 #000, -2px -2px 0 #000,
                2px -2px 0 #000, -2px 2px 0 #000;
            z-index: 5;
            will-change: transform;
        }
        .comment-fixed {
            position: absolute;
            white-space: nowrap;
            color: #ffffff;
            font-weight: bold;
            line-height: 1;
            text-shadow:
                2px 2px 0 #000, -2px -2px 0 #000,
                2px -2px 0 #000, -2px 2px 0 #000;
            z-index: 10;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: fade-and-zoom 2s forwards linear;
        }
        @keyframes fade-and-zoom {
            0% { opacity: 0; transform: translate3d(-50%, -50%, 0) scale(0.8); }
            10% { opacity: 1; transform: translate3d(-50%, -50%, 0) scale(1); }
            90% { opacity: 1; transform: translate3d(-50%, -50%, 0) scale(1); }
            100% { opacity: 0; transform: translate3d(-50%, -50%, 0) scale(0.8); }
        }
        /* コントロールパネル */
        #control-panel {
            width: 98vw; max-width: 1400px; height: calc(30vh - 30px); min-height: 180px;
            background: rgba(0, 0, 0, 0.95); margin: 10px 0; padding: 12px;
            box-sizing: border-box; border: 1px solid #d4af37;
            display: grid; grid-template-columns: 1.2fr 1.2fr 1.5fr 2fr 1fr; gap: 15px;
            color: white; font-size: 12px; overflow-y: auto;
        }
        .panel-section { display: flex; flex-direction: column; gap: 6px; border-right: 1px solid #333; padding-right: 10px; }
        .panel-section:last-child { border-right: none; padding-right: 0; }
        .panel-section-title { color: #d4af37; font-weight: bold; font-size: 11px; text-transform: uppercase; margin-bottom: 2px; }
        select, input[type="range"] { padding: 4px; background: #222; color: #fff; border: 1px solid #444; font-size: 12px; }
        #bulk-textarea { width: 100%; height: calc(100% - 35px); font-size: 11px; padding: 6px; background: #111; color: #fff; border: 1px solid #444; resize: none; }
        .btn-block { width: 100%; padding: 6px; font-size: 11px; font-weight: bold; color: white; border: none; cursor: pointer; }
        .btn-gacha-long { background-color: #d4af37; color: #000; }
        .btn-gacha-short { background-color: #a67c00; color: #fff; }
        #start-btn { background-color: #0088ff; font-size: 14px; padding: 12px; height: 50px; margin-top: 5px; }
        #stop-btn { background-color: #ff3333; font-size: 14px; padding: 12px; height: 50px; margin-top: 5px; display: none; }
        .checkbox-label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="video-area"></div>
    <div id="control-panel">
        <div class="panel-section">
            <div class="panel-section-title">🎲 文章ガチャ</div>
            <button id="gacha-long-btn" class="btn-block btn-gacha-long">カオス長文を100件生成 ⚡</button>
            <button id="gacha-short-btn" class="btn-block btn-gacha-short">突発ツッコミ（短文）生成 💬</button>
        </div>
        <div class="panel-section">
            <div class="panel-section-title">✨ 特殊エフェクト設定</div>
            <label class="checkbox-label"><input type="checkbox" id="mode-center"> 📌 短文を中央に固定</label>
            <label class="checkbox-label"><input type="checkbox" id="mode-scatter"> 🌍 短文を全体に分散（重なり防止）</label>
            <label class="checkbox-label"><input type="checkbox" id="mode-reverse"> 🔄 弾幕を「左から右」へ逆流</label>
            <label class="checkbox-label"><input type="checkbox" id="mode-huge" checked> 🦖 10個に1個「超巨大文字」</label>
        </div>
        <div class="panel-section">
            <div class="panel-section-title">⚙️ 基本設定</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <div><label>フォント:</label><br>
                    <select id="font-select" style="width:100%;">
                        <option value="'Noto Sans JP', sans-serif">極太ゴシック</option>
                        <option value="'Dela Gothic One', sans-serif">デラ・ゴシック</option>
                        <option value="'MS UI Gothic', sans-serif">ニコニコ風</option>
                    </select>
                </div>
                <div><label>タイマー:</label><br>
                    <select id="duration-select" style="width:100%;">
                        <option value="10">10秒</option>
                        <option value="30">30秒</option>
                        <option value="60" selected>1分間</option>
                        <option value="120">2分間</option>
                    </select>
                </div>
            </div>
            <div style="margin-top: 5px;">
                <label>スピード（秒）:</label>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <input type="range" id="global-speed" min="2" max="10" step="0.5" value="6" style="width:70%;">
                    <span id="speed-val">6秒</span>
                </div>
            </div>
            <div>
                <label>文字の色:</label>
                <select id="global-color" style="width:100%;">
                    <option value="random">ランダム（合成安全色）</option>
                    <option value="#ffffff">白</option>
                    <option value="#ffff00">黄</option>
                    <option value="#ff0000">赤</option>
                </select>
            </div>
        </div>
        <div class="panel-section">
            <div class="panel-section-title">📝 現在の文字リスト</div>
            <textarea id="bulk-textarea" placeholder="ガチャを引くか、直接入力してください。"></textarea>
            <div id="line-count" style="font-size:10px; color:#aaa; text-align:right;">現在: 0個</div>
        </div>
        <div class="panel-section" style="justify-content: center;">
            <button id="start-btn" class="btn-block">弾幕スタート 🚀</button>
            <button id="stop-btn" class="btn-block">一時停止 🛑</button>
            <div id="playback-status" style="text-align: center; margin-top: 5px; font-weight: bold;"></div>
        </div>
    </div>

    <script>
        const subjects = ["全米がスタンディングオベーションで", "神絵師と神編集者が手を組んで", "AIすら嫉妬する天才が", "ウチのオカンが涙を流しながら", "実家のじいちゃんがスタンバって", "通りすがりのガチプロが", "画面前の全視聴者が", "古参のニコ厨たちが", "運営が公式認定ボタンを構えて", "筋肉モリモリのイケメンが"];
        const places = ["大草原の上でお祭り騒ぎしながら", "1分15秒の神クオリティの中で", "Vrewのタイムラインが震える熱量で", "実家のような最高の安心感の中で", "全人類が歴史の目撃者となった瞬間に"];
        const actions = ["最高すぎて一生ついていくと誓った", "神編集すぎて脳をバグらせてきた", "野生のプロの恐ろしい意地を見せつけた", "違和感を完全にあの世に葬り去った", "涙目で感動を要求した"];
        const shortWords = ["ｷﾀ━━━━(ﾟ∀ﾟ)━━━━!!", "(ﾉ∀`)ｱﾁｬー", "（*´▽｀*）", "(`・ω・´)ｼｬｷｰﾝ", "( ﾟ∀ﾟ)o彡°うおおおおお！", "88888888888", "ブラボー！！👏", "天才かｗｗｗ"];

        const videoArea = document.getElementById('video-area');
        const NUM_LANES = 12;
        let activeTimers = []; // 全てのアクティブなタイマーを管理

        // 各種要素の取得
        const gachaLongBtn = document.getElementById('gacha-long-btn');
        const gachaShortBtn = document.getElementById('gacha-short-btn');
        const bulkTextarea = document.getElementById('bulk-textarea');
        const lineCountDisp = document.getElementById('line-count');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const statusDisp = document.getElementById('playback-status');
        const fontSelect = document.getElementById('font-select');
        const durationSelect = document.getElementById('duration-select');
        const globalSpeed = document.getElementById('global-speed');
        const globalColor = document.getElementById('global-color');
        const modeCenter = document.getElementById('mode-center');
        const modeScatter = document.getElementById('mode-scatter');
        const modeReverse = document.getElementById('mode-reverse');
        const modeHuge = document.getElementById('mode-huge');

        // スピードスライダーのリアルタイム表示
        globalSpeed.addEventListener('input', () => {
            document.getElementById('speed-val').textContent = globalSpeed.value + '秒';
        });

        // ガチャ機能
        gachaLongBtn.addEventListener('click', () => {
            let res = [];
            for (let i = 0; i < 100; i++) {
                res.push(`${subjects[Math.floor(Math.random() * subjects.length)]}${places[Math.floor(Math.random() * places.length)]}${actions[Math.floor(Math.random() * actions.length)]}`);
            }
            bulkTextarea.value = res.join('\n');
            updateLineCount();
        });
        gachaShortBtn.addEventListener('click', () => {
            let res = [];
            for (let i = 0; i < 100; i++) {
                res.push(shortWords[Math.floor(Math.random() * shortWords.length)]);
            }
            bulkTextarea.value = res.join('\n');
            updateLineCount();
        });

        function getCommentsArray() {
            return bulkTextarea.value.split('\n').map(l => l.trim()).filter(l => l !== '');
        }
        function updateLineCount() {
            lineCountDisp.textContent = `現在: ${getCommentsArray().length}個`;
        }
        bulkTextarea.addEventListener('input', updateLineCount);

        // レーンのY座標計算（文字がはみ出さないようにマージンを調整）
        function getLaneY(lane) {
            const laneHeight = videoArea.offsetHeight / (NUM_LANES + 1);
            return (lane * laneHeight) + (laneHeight / 2);
        }

        // コメント生成・アニメーション関数
        function triggerComment(text, colorType, speedSec, index, lane) {
            const font = fontSelect.value;
            let color = colorType === 'random' 
                ? ['#ffffff','#ffff00','#ff0000','#ff00ff','#00ffff','#ff9900'][Math.floor(Math.random()*6)] 
                : colorType;

            const isHuge = modeHuge.checked && (index % 10 === 0);
            
            // 📌 エフェクト1: 中央固定モードの処理
            if (modeCenter.checked && text.length <= 15) {
                const fixedComment = document.createElement('div');
                fixedComment.className = 'comment-fixed';
                fixedComment.textContent = text;
                fixedComment.style.fontFamily = font;
                fixedComment.style.color = color;
                fixedComment.style.fontSize = isHuge ? '50px' : '28px';
                // 画面中央付近のレーンに配置
                fixedComment.style.top = getLaneY(Math.floor(NUM_LANES / 2)) + 'px';
                videoArea.appendChild(fixedComment);
                
                setTimeout(() => fixedComment.remove(), 2000);
                return;
            }

            // 通常の流れ弾幕
            const comment = document.createElement('div');
            comment.className = 'comment';
            comment.textContent = text;
            comment.style.fontFamily = font;
            comment.style.color = color;
            comment.style.fontSize = isHuge ? '48px' : '24px';

            // 📌 エフェクト2: 全体に分散モード or 通常12レーン
            if (modeScatter.checked) {
                comment.style.top = Math.random() * (videoArea.offsetHeight - 50) + 'px';
            } else {
                comment.style.top = getLaneY(lane) + 'px';
            }

            // 初期位置を設定（まずは画面外に隠す）
            const isReverse = modeReverse.checked;
            comment.style.left = isReverse ? '-999px' : '999px';
            videoArea.appendChild(comment);

            // 🛑 横幅（offsetWidth）を正確に取得するために1フレーム待つ
            requestAnimationFrame(() => {
                const commentWidth = comment.offsetWidth;
                const areaWidth = videoArea.offsetWidth;
                const duration = speedSec * 1000;

                const startLeft = isReverse ? -commentWidth : areaWidth;
                comment.style.left = startLeft + 'px';

                const startTime = performance.now();

                function animate(now) {
                    if (!comment.isConnected) return; // 途中で削除されたらアニメーションを止める
                    const elapsed = now - startTime;
                    const progress = elapsed / duration;

                    if (progress < 1) {
                        let currentLeft = isReverse
                            ? startLeft + (areaWidth + commentWidth) * progress
                            : startLeft - (areaWidth + commentWidth) * progress;
                        comment.style.transform = `translateX(${currentLeft - startLeft}px)`;
                        requestAnimationFrame(animate);
                    } else {
                        comment.remove();
                    }
                }
                requestAnimationFrame(animate);
            });
        }

        // 基本システム停止
        function stopSystem() {
            activeTimers.forEach(t => clearTimeout(t));
            activeTimers = [];
            document.querySelectorAll('.comment, .comment-fixed').forEach(el => el.remove());
            statusDisp.textContent = '⏹ 停止中';
            startBtn.style.display = 'block';
            stopBtn.style.display = 'none';
        }

        // 弾幕スタート
        startBtn.addEventListener('click', () => {
            const comments = getCommentsArray();
            if (comments.length === 0) {
                alert('ガチャを引くか、文字を入力してください！');
                return;
            }

            stopSystem(); // 既存の再生をクリア

            const totalDuration = parseInt(durationSelect.value);
            const speedSec = parseFloat(globalSpeed.value);
            const colorType = globalColor.value;

            statusDisp.textContent = '▶ 再生中...';
            startBtn.style.display = 'none';
            stopBtn.style.display = 'block';

            // 指定されたタイマー時間（例: 60秒）の間に、コメントを均等に分散させて発射する
            const intervalTime = (totalDuration * 1000) / comments.length;

            comments.forEach((text, index) => {
                // 12レーンを順番に割り当てて、同じレーンの連続を防ぐ
                const lane = index % NUM_LANES; 
                // 少しだけ発射タイミングを前後に散らして自然にする
                const jitter = (Math.random() - 0.5) * (intervalTime * 0.8);
                const launchTime = Math.max(0, (index * intervalTime) + jitter);

                const t = setTimeout(() => {
                    triggerComment(text, colorType, speedSec, index, lane);
                }, launchTime);
                
                activeTimers.push(t);
            });

            // 全体終了タイマー
            const endTimer = setTimeout(() => {
                statusDisp.textContent = '⏹ 終了';
                startBtn.style.display = 'block';
                stopBtn.style.display = 'none';
            }, totalDuration * 1000 + (speedSec * 1000)); // スピード分の余韻を持たせる
            
            activeTimers.push(endTimer);
        });

        // 停止ボタンのイベント
        stopBtn.addEventListener('click', stopSystem);

        // 初期化
        window.addEventListener('load', updateLineCount);
    </script>
</body>
</html>
