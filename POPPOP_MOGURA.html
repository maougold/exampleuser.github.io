<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POP POP CARNIVAL! - ULTIMATE FIXED</title>
    <style>
        :root {
            --bg-color: #fffae3;
            --hole-color: #754c24;
            --accent-pink: #ff66b2;
            --accent-yellow: #ffcc00;
            --accent-blue: #66ccff;
            --accent-red: #ff4d4d;
            --accent-orange: #ff9933;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            background-image: radial-gradient(#fff 20%, transparent 20%), radial-gradient(#fff 20%, transparent 20%);
            background-size: 50px 50px; background-position: 0 0, 25px 25px;
            color: #555; font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        .container { display: flex; gap: 40px; align-items: flex-start; }

        /* ランキングパネル */
        .ranking-panel {
            width: 250px; height: 500px; background: rgba(255, 255, 255, 0.9);
            border: 5px solid var(--accent-blue); border-radius: 20px;
            padding: 15px; overflow-y: auto; box-shadow: 10px 10px 0 var(--accent-blue);
        }
        .ranking-title { text-align: center; font-size: 1.2rem; border-bottom: 2px dashed #ccc; padding-bottom: 5px; font-weight: bold; }
        .rank-item { padding: 8px; border-radius: 10px; margin-bottom: 8px; font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(0,0,0,0.05); }

        /* ゲームエリア */
        .game-area { display: flex; flex-direction: column; align-items: center; position: relative; }
        .info-panel { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-box { font-size: 1.5rem; background: white; padding: 10px 20px; border-radius: 50px; border: 4px solid var(--accent-pink); font-weight: bold; min-width: 120px; text-align: center; box-shadow: 0 4px 0 rgba(0,0,0,0.1); }

        #game-board {
            position: relative; width: 500px; height: 500px;
            background: rgba(255, 255, 255, 0.5); border-radius: 50%;
            border: 8px dashed var(--accent-yellow);
            transition: background 0.5s;
        }
        #game-board.fever { background: rgba(255, 102, 178, 0.2); border-color: var(--accent-pink); animation: shake 0.5s infinite; }

        @keyframes shake { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(1.5deg); } 75% { transform: rotate(-1.5deg); } }

        /* 中央スタートボタン：絶対に動かないように固定 */
        #start-btn-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
        }
        .round-btn {
            width: 160px; height: 160px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, var(--accent-pink), #ff3399); color: white; 
            font-size: 1.6rem; font-weight: bold; box-shadow: 0 10px 0 #d44d8d, 0 15px 30px rgba(0,0,0,0.2);
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
            display: flex; justify-content: center; align-items: center; text-align: center;
        }
        .round-btn:hover { transform: scale(1.05); }
        .round-btn:active { transform: scale(0.95) translateY(5px); box-shadow: 0 4px 0 #d44d8d; }

        /* 穴とキャラ */
        .hole { position: absolute; width: 85px; height: 85px; background: var(--hole-color); border-radius: 50%; border: 4px solid #5d3a1b; overflow: hidden; box-shadow: inset 0 10px 20px rgba(0,0,0,0.5); }
        .char { width: 100%; height: 100%; position: absolute; top: 100%; display: flex; justify-content: center; align-items: center; font-size: 55px; transition: top 0.1s; user-select: none; cursor: pointer; }
        .char.up { top: 5%; }

        /* モーダル */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 0 0 30px 0; border-radius: 30px; text-align: center; max-width: 420px; border: 8px solid var(--accent-yellow); overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        .modal-header { background: linear-gradient(to right, var(--accent-yellow), var(--accent-orange)); padding: 20px; margin-bottom: 20px; }
        .modal-header h2 { margin: 0; color: white; font-size: 2rem; text-shadow: 2px 2px 0 rgba(0,0,0,0.2); }

        .score-guide { text-align: left; background: #fdfdfd; padding: 20px; border-radius: 20px; margin: 0 30px 20px 30px; border: 2px dashed #ddd; line-height: 1.8; }
        .hidden { display: none !important; }

        .hit-effect { position: absolute; pointer-events: none; font-size: 50px; animation: pop 0.5s forwards; z-index: 60;}
        @keyframes pop { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(2.5) translateY(-60px); opacity: 0; } }
        
        .btn-main { padding: 12px 50px; background: var(--accent-blue); color:white; border:none; border-radius:50px; cursor:pointer; font-weight:bold; font-size: 1.2rem; box-shadow: 0 5px 0 #4da3d4; transition: 0.2s; }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 2px 0 #4da3d4; }
    </style>
</head>
<body>

    <div id="intro-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🎪 HOW TO PLAY 🎪</h2>
            </div>
            <p style="font-weight: bold; font-size: 1.1rem;">120秒間のカーニバル開幕！</p>
            <div class="score-guide">
                🤡 <strong>ピエロ</strong>：100点 (ふつう)<br>
                👽🤖🐻🐷🍄 <strong>レア</strong>：300点！<br>
                💣 <strong>ばくだん</strong>：<span style="color:red;">−500点！！</span><br>
                <hr style="border: 0; border-top: 1px solid #eee;">
                🚨 <strong>残り30秒は激ムズ＆レアUP！</strong> 🚨
            </div>
            <button class="btn-main" onclick="hideIntro()">OK! レッツゴー!</button>
        </div>
    </div>

    <div class="container">
        <div class="game-area">
            <div class="info-panel">
                <div class="stat-box" style="color: #ff66b2;">TIME: <span id="time">120</span></div>
                <div class="stat-box" style="color: #66ccff;">SCORE: <span id="score">0</span></div>
            </div>
            <div id="game-board">
                <div id="start-btn-container">
                    <button id="start-btn" class="round-btn">CARNIVAL<br>START!</button>
                </div>
            </div>
        </div>

        <div class="ranking-panel">
            <div class="ranking-title">🏆 TOP RANKING</div>
            <div id="ranking-list"></div>
        </div>
    </div>

    <div id="result-modal" class="modal hidden">
        <div class="modal-content" style="padding-top: 40px;">
            <h1 style="color: var(--accent-pink); font-size: 3rem; margin: 0;">FINISH!</h1>
            <p style="font-size: 1.5rem; margin-bottom: 0;">最終スコア</p>
            <p id="final-score" style="font-size: 4rem; font-weight: bold; color: var(--accent-blue); margin: 10px 0;">0</p>
            <button class="btn-main" onclick="closeResult()" style="background: var(--accent-pink); box-shadow: 0 5px 0 #d44d8d;">もう一回あそぶ</button>
        </div>
    </div>

    <script>
        const board = document.getElementById('game-board');
        const scoreDisplay = document.getElementById('score');
        const timeDisplay = document.getElementById('time');
        const startBtnContainer = document.getElementById('start-btn-container');
        const rankingList = document.getElementById('ranking-list');
        
        let score = 0;
        let timeLeft = 120;
        let gameActive = false;
        let bgmInterval;

        window.onload = () => { renderRanking(); };

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type, duration, vol=0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function startBGM() {
            let beat = 0;
            bgmInterval = setInterval(() => {
                if (!gameActive) return;
                playSound(beat % 4 === 0 ? 60 : 45, 'sine', 0.2, 0.15);
                if (beat % 2 === 0) {
                    const notes = [261.63, 329.63, 392.00, 523.25];
                    playSound(notes[Math.floor(Math.random()*notes.length)], 'triangle', 0.1, 0.05);
                }
                beat++;
            }, 250);
        }

        for (let i = 0; i < 10; i++) {
            const hole = document.createElement('div');
            hole.className = 'hole';
            const angle = (i / 10) * Math.PI * 2;
            hole.style.left = (205 + Math.cos(angle) * 205) + 'px';
            hole.style.top = (205 + Math.sin(angle) * 205) + 'px';
            const charDiv = document.createElement('div');
            charDiv.className = 'char';
            hole.appendChild(charDiv);
            board.appendChild(hole);
            charDiv.addEventListener('mousedown', (e) => hit(e, charDiv));
        }

        const charElems = document.querySelectorAll('.char');

        function peek() {
            if (!gameActive) return;
            const mole = charElems[Math.floor(Math.random() * charElems.length)];
            const rand = Math.random();
            const isFever = timeLeft <= 30;
            const rareThreshold = isFever ? 0.45 : 0.2; 
            const bombThreshold = isFever ? 0.15 : 0.08; 

            if (rand < bombThreshold) {
                mole.innerText = '💣'; mole.dataset.type = 'bomb';
            } else if (rand < rareThreshold + bombThreshold) {
                const rare = ['👽', '🤖', '🐻', '🐷', '🍄'];
                mole.innerText = rare[Math.floor(Math.random() * rare.length)];
                mole.dataset.type = 'rare';
            } else {
                mole.innerText = '🤡'; mole.dataset.type = 'normal';
            }

            mole.classList.add('up');
            const speed = isFever ? 450 : 1000;
            setTimeout(() => {
                mole.classList.remove('up');
                if (gameActive) peek();
            }, Math.max(300, speed - (score / 70)));
        }

        function hit(e, mole) {
            if (!mole.classList.contains('up')) return;
            const type = mole.dataset.type;
            let pts = (type === 'bomb') ? -500 : (type === 'rare' ? 300 : 100);
            if (type === 'bomb') {
                playSound(80, 'sawtooth', 0.6, 0.4); showEffect(e.pageX, e.pageY, '💥');
            } else {
                playSound(1000, 'square', 0.1); showEffect(e.pageX, e.pageY, '✨');
            }
            score += pts;
            scoreDisplay.textContent = score;
            mole.classList.remove('up');
        }

        function showEffect(x, y, txt) {
            const el = document.createElement('div');
            el.className = 'hit-effect'; el.innerText = txt;
            el.style.left = (x-25)+'px'; el.style.top = (y-25)+'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 500);
        }

        function saveAndRender(finalScore) {
            let history = JSON.parse(localStorage.getItem('carnival_scores')) || [];
            const now = new Date();
            const dateStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
            history.unshift({ score: finalScore, date: dateStr });
            history.sort((a, b) => b.score - a.score);
            history = history.slice(0, 15);
            localStorage.setItem('carnival_scores', JSON.stringify(history));
            renderRanking();
        }

        function renderRanking() {
            rankingList.innerHTML = '';
            const history = JSON.parse(localStorage.getItem('carnival_scores')) || [];
            history.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'rank-item';
                const color = item.score > 5000 ? '#ffcc00' : (item.score > 2000 ? '#66ff99' : '#66ccff');
                div.style.borderLeft = `5px solid ${color}`;
                div.style.background = color + '15';
                div.innerHTML = `<span>${index+1}. ${item.date}</span><strong>${item.score}</strong>`;
                rankingList.appendChild(div);
            });
        }

        function startTimer() {
            const timer = setInterval(() => {
                timeLeft--;
                timeDisplay.textContent = timeLeft;
                if (timeLeft === 30) board.classList.add('fever');
                if (timeLeft <= 0) {
                    clearInterval(timer); clearInterval(bgmInterval);
                    gameActive = false;
                    document.getElementById('final-score').innerText = score;
                    document.getElementById('result-modal').classList.remove('hidden');
                    saveAndRender(score);
                }
            }, 1000);
        }

        function hideIntro() { document.getElementById('intro-modal').classList.add('hidden'); }
        function closeResult() { document.getElementById('result-modal').classList.add('hidden'); startBtnContainer.classList.remove('hidden'); board.classList.remove('fever');}

        document.getElementById('start-btn').addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            score = 0; timeLeft = 120;
            scoreDisplay.textContent = score;
            gameActive = true;
            startBtnContainer.classList.add('hidden');
            startBGM();
            peek(); peek(); peek();
            startTimer();
        });
    </script>
</body>
</html>
