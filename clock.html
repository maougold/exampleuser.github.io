<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Gimmick Cyber Clock - Toggle</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1000px;
            font-family: 'Courier New', Courier, monospace;
        }

        #bg {
            position: absolute;
            top: 0; left: 0;
            z-index: -1;
            opacity: 0.3;
        }

        .clock-container {
            text-align: center;
            border: 3px solid #61dafb;
            padding: 30px 50px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(97, 218, 251, 0.5);
            /* transitionを少し長くして、戻る時の動きを滑らかに */
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            pointer-events: none;
        }

        #date { font-size: 1.5rem; color: #61dafb; margin-bottom: 10px; text-shadow: 0 0 10px #61dafb; }
        #clock { font-size: 6rem; color: #61dafb; font-weight: bold; text-shadow: 0 0 20px #61dafb; }

        /* 切り替えボタンのスタイル */
        .toggle-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            padding: 10px 20px;
            background: transparent;
            color: #61dafb;
            border: 2px solid #61dafb;
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: 0.3s;
            z-index: 10;
        }
        .toggle-btn:hover {
            background: rgba(97, 218, 251, 0.2);
            box-shadow: 0 0 15px #61dafb;
        }
        /* ON状態の時の見た目 */
        .toggle-btn.active {
            background: #61dafb;
            color: #0d1117;
        }
    </style>
</head>
<body>

    <canvas id="bg"></canvas>

    <div class="clock-container" id="container">
        <div id="date">0000/00/00 (---)</div>
        <div id="clock">00:00:00</div>
    </div>

    <button class="toggle-btn" id="tiltBtn">3D MODE: OFF</button>

    <script>
        // --- 1. 時計と背景の基本機能 ---
        function updateClock() {
            const now = new Date();
            const options = { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' };
            document.getElementById('date').textContent = now.toLocaleDateString('ja-JP', options);
            const t = now.toTimeString().split(' ')[0]; // hh:mm:ss形式
            document.getElementById('clock').textContent = t;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 背景マトリックス（前回のまま）
        const canvas = document.getElementById('bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width / 16)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = 'rgba(13, 17, 23, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#61dafb';
            drops.forEach((y, i) => {
                const text = String.fromCharCode(Math.random() * 128);
                ctx.fillText(text, i * 16, y * 16);
                if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 50);

        // --- 2. ギミック：ボタンによる3Dチルトの切り替え ---
        const container = document.getElementById('container');
        const tiltBtn = document.getElementById('tiltBtn');
        let isTiltEnabled = false; // 初期状態はOFF

        tiltBtn.addEventListener('click', () => {
            isTiltEnabled = !isTiltEnabled; // 真偽値を反転
            
            if (isTiltEnabled) {
                tiltBtn.textContent = '3D MODE: ON';
                tiltBtn.classList.add('active');
            } else {
                tiltBtn.textContent = '3D MODE: OFF';
                tiltBtn.classList.remove('active');
                // OFFにした時は強制的に正面（0度）に戻す
                container.style.transform = `rotateY(0deg) rotateX(0deg)`;
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (!isTiltEnabled) return; // OFFなら何もしない

            const x = (window.innerWidth / 2 - e.pageX) / 20;
            const y = (window.innerHeight / 2 - e.pageY) / 20;
            container.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        });
    </script>
</body>
</html>
