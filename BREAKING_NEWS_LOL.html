<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ありそうで無いニュース速報ジェネレーター【完全版】</title>
    
    <!-- Google Fonts（報道に最適なクッキリ極太フォント） -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            overflow: hidden;
            font-family: 'Noto Sans JP', sans-serif;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 🎬 16:9 ビデオエリア（グリーンバック） */
        #video-area {
            position: relative;
            width: 100vw;
            height: 56.25vw;
            max-height: 70vh;
            max-width: 124.44vh;
            background-color: #00ff00; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            margin-top: 10px;
            overflow: hidden; 
            z-index: 1;
        }

        /* 🚨 演出1：BREAKING NEWS（特報） */
        #breaking-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(160, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }
        #breaking-overlay.active {
            opacity: 1;
            animation: flash-bg 0.5s ease infinite alternate;
        }
        .breaking-title {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 75px;
            color: #fff;
            text-shadow: 0 5px 20px rgba(0,0,0,0.6);
            letter-spacing: 6px;
            transform: scale(0.8);
        }
        .breaking-subtitle {
            font-size: 30px;
            color: #ffcc00;
            font-weight: 900;
            margin-top: 12px;
            letter-spacing: 4px;
        }
        #breaking-overlay.active .breaking-title {
            animation: zoom-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes flash-bg {
            0% { background: rgba(140, 0, 0, 0.95); }
            100% { background: rgba(200, 0, 0, 0.95); }
        }
        @keyframes zoom-in { to { transform: scale(1); } }

        /* 📺 演出2：ニュース番組UI */
        #news-ui-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 100;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #news-ui-container.show {
            display: block;
            opacity: 1;
        }

        /* 左上の報道バッジ */
        .news-badge {
            position: absolute;
            top: 25px;
            left: 30px;
            background: linear-gradient(135deg, #ffcc00, #ff9900);
            color: #000;
            font-weight: 900;
            font-size: 22px;
            padding: 4px 18px;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            border: 1px solid #fff;
            transition: background 0.3s;
        }
        /* デマバッジなどの色変え用 */
        .badge-blue { background: linear-gradient(135deg, #00ccff, #0066cc) !important; color: #fff !important; }
        .badge-red { background: linear-gradient(135deg, #ff3333, #cc0000) !important; color: #fff !important; }
        .badge-purple { background: linear-gradient(135deg, #cc33ff, #8800cc) !important; color: #fff !important; }

        /* 右上のLIVEバッジ */
        .news-live-badge {
            position: absolute;
            top: 25px;
            right: 30px;
            background: #cc0000;
            color: #fff;
            font-weight: 900;
            font-size: 18px;
            padding: 4px 12px;
            border-radius: 2px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .live-dot {
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            animation: pulse 0.8s infinite alternate;
        }
        @keyframes pulse { 0% { opacity: 0.3; } 100% { opacity: 1; } }

        /* 下部テロップ座布団（絶対潰れない設計） */
        .news-ticker-area {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 1050px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* 大見出し（赤座布団） */
        .ticker-main-row {
            background: linear-gradient(to right, #cc0000, #990000);
            color: #ffffff;
            font-size: 34px;
            font-weight: 900;
            padding: 10px 22px;
            border-left: 10px solid #ffcc00;
            box-shadow: 0 6px 15px rgba(0,0,0,0.5);
            white-space: nowrap;
            overflow: hidden;
            letter-spacing: 1px;
            text-shadow: 2px 2px 3px rgba(0,0,0,0.6); /* クッキリ補正 */
        }

        /* 詳細（白座布団） */
        .ticker-sub-row {
            background: rgba(255, 255, 255, 0.96);
            color: #111111;
            font-size: 22px;
            font-weight: 700;
            padding: 12px 22px;
            border-left: 10px solid #444;
            min-height: 32px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            line-height: 1.4;
            letter-spacing: 0.5px;
        }

        /* 🛠️ コントロールパネル */
        #control-panel {
            width: 98vw;
            max-width: 1200px;
            height: calc(30vh - 30px);
            min-height: 180px;
            background: rgba(0, 0, 0, 0.95);
            margin: 10px 0;
            padding: 12px;
            box-sizing: border-box;
            border: 2px solid #cc0000;
            display: grid;
            grid-template-columns: 1.1fr 1.6fr 0.9fr; 
            gap: 15px;
            color: white;
            font-size: 13px;
        }

        .panel-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
            border-right: 1px solid #333;
            padding-right: 15px;
            justify-content: center;
        }
        .panel-section:last-child {
            border-right: none;
            padding-right: 0;
        }

        .panel-section-title {
            color: #ff4444;
            font-weight: bold;
            font-size: 12px;
            border-bottom: 1px solid #444;
            padding-bottom: 4px;
            margin-bottom: 3px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 11px;
            color: #ccc;
        }

        select, input[type="text"] {
            padding: 5px;
            background: #111;
            color: #fff;
            border: 1px solid #444;
            font-size: 12px;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .strike-input-row {
            display: flex;
            gap: 6px;
            align-items: center;
            width: 100%;
        }
        .strike-input-row .in-t { flex: 1.2; }
        .strike-input-row .in-d { flex: 2; }
        
        .manual-shoot-btn {
            background: linear-gradient(135deg, #cc0000, #880000);
            color: white;
            border: 1px solid #ff6666;
            border-radius: 4px;
            padding: 5px 12px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
        }
        .manual-shoot-btn:active { transform: scale(0.95); }

        #random-strike-btn {
            background: linear-gradient(135deg, #ff9900, #ff5500);
            color: white;
            border: 1px solid #fff;
            border-radius: 6px;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 100, 0, 0.3);
        }
        #random-strike-btn:active { transform: scale(0.96); }

        .action-btn {
            width: 100%;
            padding: 8px;
            font-size: 14px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        #start-btn { background-color: #0088ff; }
        #stop-btn { background-color: #ff3333; display: none; }

        .status-timer-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 2px;
        }
        #timer-disp {
            font-family: monospace;
            font-size: 14px;
            color: #ff4444;
            font-weight: bold;
            background: #111;
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <!-- 16:9 ビデオエリア -->
    <div id="video-area">
        
        <!-- 🚨 特報オーバーレイ -->
        <div id="breaking-overlay">
            <div class="breaking-title">BREAKING NEWS</div>
            <div class="breaking-subtitle">報道特報</div>
        </div>

        <!-- 📺 ニュース番組UI -->
        <div id="news-ui-container">
            <div class="news-badge" id="news-badge-text">速報</div>
            <div class="news-live-badge"><div class="live-dot"></div>LIVE</div>
            
            <div class="news-ticker-area">
                <div class="ticker-main-row" id="ticker-title">【速報】待機中</div>
                <div class="ticker-sub-row" id="ticker-desc">放送システムを起動してボタンを押してください。</div>
            </div>
        </div>

    </div>

    <!-- コントロールパネル -->
    <div id="control-panel">
        
        <!-- 1. 全自動＆オプション設定 -->
        <div class="panel-section">
            <div class="panel-section-title">⚙️ 自動 ＆ 表示オプション</div>
            
            <div>
                <label style="font-size:11px; color:#aaa;">報道バッジの種類:</label>
                <select id="badge-select" style="width: 100%; margin-top: 2px;">
                    <option value="速報">速報（標準・オレンジ）</option>
                    <option value="独自">独自（スクープ・オレンジ）</option>
                    <option value="中継">中継（現場から・青）</option>
                    <option value="警告">警告（注意喚起・赤）</option>
                    <option value="デマ">※デマ（ネタ動画用・紫）</option>
                </select>
            </div>

            <label class="checkbox-label" style="margin-top: 5px;">
                <input type="checkbox" id="enable-auto-hide" checked> ⏱️ 7秒後にテロップを自動格納する
            </label>
            
            <button id="random-strike-btn" style="margin-top: auto;">🎲 おまかせ嘘ニュース発射！</button>
        </div>

        <!-- 2. 手動・3連カスタム入力 -->
        <div class="panel-section">
            <div class="panel-section-title">🚨 事前入力ニュース（縦並び3レーン）</div>
            
            <div class="strike-input-row">
                <input type="text" class="in-t" id="custom-title-1" value="【驚愕】「あと5分」から2時間経過" placeholder="見出し">
                <input type="text" class="in-d" id="custom-desc-1" value="布団の引力による時空の歪みが原因とみられ、有識者は「二度寝の恐ろしさ」を指摘しています。" placeholder="詳細説明">
                <button class="manual-shoot-btn" onclick="triggerNewsStrike(1)">報道 💥</button>
            </div>
            
            <div class="strike-input-row">
                <input type="text" class="in-t" id="custom-title-2" value="【大論争】「何でもいい」の正解見つからず" placeholder="見出し">
                <input type="text" class="in-d" id="custom-desc-2" value="今日の夕飯について「何でもいい」と言った妻に対し、提案した全候補が却下され現場は緊迫しています。" placeholder="詳細説明">
                <button class="manual-shoot-btn" onclick="triggerNewsStrike(2)">報道 💥</button>
            </div>
            
            <div class="strike-input-row">
                <input type="text" class="in-t" id="custom-title-3" value="【速報】全国のオカン、一斉に「あれ」を発動" placeholder="見出し">
                <input type="text" class="in-d" id="custom-desc-3" value="「あれをあれして」の指示に対し、家族側は高度な言語解読を求められる事態となっています。" placeholder="詳細説明">
                <button class="manual-shoot-btn" onclick="triggerNewsStrike(3)">報道 💥</button>
            </div>
        </div>

        <!-- 3. メインコントロール -->
        <div class="panel-section">
            <div class="panel-section-title">▶ 放送システム制御</div>
            <div style="width:100%; display:flex; flex-direction:column; gap:4px;">
                <button id="start-btn" class="action-btn">放送システム起動 🚀</button>
                <button id="stop-btn" class="action-btn">放送終了（一時停止） 🛑</button>
            </div>
            
            <div class="status-timer-container">
                <div id="status-disp" style="font-size: 11px; color: #888;">待機中</div>
                <div id="timer-disp">⏱ 00:00</div>
            </div>
        </div>

    </div>

    <script>
        // 🤖 おまかせ嘘ニュースのデータベース（大量追加！）
        const randomNewsDB = [
            { t: "【速報】日曜日、体感4秒で終了したと発表", d: "多くの市民から「まだ何もしていない」「明日から仕事など嘘だ」と現実を受け入れられない声が相次いでいます。" },
            { t: "【悲報】週明けの月曜日、誰の許可を得て始まったのか物議", d: "政府や関係各所への取材を進めていますが、現時点で月曜日が開始された明確な理由は判明していません。" },
            { t: "【密着】テレビのリモコン、またもやソファの隙間で発見", d: "捜索隊は「無意識のうちに吸い込まれる未知の引力が、あの隙間には働いている」と強い警戒を呼びかけています。" },
            { t: "【衝撃】「ちょっと何言ってるか分からない」と鳴く鳥が発見", d: "東北地方を中心に目撃情報が相次いでおり、有識者は「ただのサンドウィッチマンのファンではないか」とみています。" },
            { t: "【悲報】ポテトチップス、中身のほぼ8割が「空気」と判明", d: "開けた瞬間の絶望感について、製造元は「ポテトの鮮度と、開けた瞬間のワクワクを守るための愛です」と回答しました。" },
            { t: "【独自】猫の集会、議題は「カリカリの減量について」と判明", d: "現場には緊迫した空気が流れており、参加した猫からは「断固として抗議のニャーを続ける」との声明が出されました。" },
            { t: "【驚愕】「明日から本気出す」の明日、永久に来ない可能性", d: "専門機関のシミュレーションによると、このままでは人類は永遠に「昨日出さなかった本気」を追い求め続けることになります。" },
            { t: "【速報】全日本からあげ協会、レモン無断生搾りに激怒", d: "「良かれと思ってやった」と供述する犯人に対し、協会側は「事前の確認なきレモンは宣戦布告とみなす」と猛反発しています。" },
            { t: "【怪奇】入室した瞬間「何を取りに来たか忘れる現象」多発", d: "リビングや台所に足を踏み入れた途端、記憶が消去されるこの現象に対し、ネットでは「部屋の敷居に記憶消去装置がある」との説が濃厚です。" },
            { t: "【悲報】スマホの充電コード、寝落ちの夜に限って届かない", d: "あとわずか3センチの距離をめぐり、人類の怠惰と物理の法則が激しく衝突する悲劇が全国で多発しています。" }
        ];

        const breakingOverlay = document.getElementById('breaking-overlay');
        const newsUi = document.getElementById('news-ui-container');
        const tickerTitle = document.getElementById('ticker-title');
        const tickerDesc = document.getElementById('ticker-desc');
        const badgeSelect = document.getElementById('badge-select');
        const badgeText = document.getElementById('news-badge-text');
        const chkAutoHide = document.getElementById('enable-auto-hide');
        
        const btnRandom = document.getElementById('random-strike-btn');
        const btnStart = document.getElementById('start-btn');
        const btnStop = document.getElementById('stop-btn');
        const statusDisp = document.getElementById('status-disp');
        const timerDisp = document.getElementById('timer-disp');

        let isRunning = false;
        let startTime = 0;
        let clockInterval = null;
        let typeInterval = null;
        let hideTimer = null; // 自動格納用

        // 🎨 バッジの色を切り替える関数
        function updateBadgeStyle(type) {
            badgeText.textContent = type;
            badgeText.className = "news-badge"; // リセット
            
            if (type === "中継") badgeText.classList.add('badge-blue');
            if (type === "警告") badgeText.classList.add('badge-red');
            if (type === "デマ") badgeText.classList.add('badge-purple');
        }

        // ✍️ ニュースカチカチタイピング演出
        function typeWriterEffect(element, text, speed = 40) {
            clearInterval(typeInterval);
            element.textContent = "";
            let i = 0;
            
            typeInterval = setInterval(() => {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                } else {
                    clearInterval(typeInterval);
                    // ⏱️ 4. 文字が出終わったら、自動格納のカウントダウン開始
                    if (chkAutoHide.checked) {
                        clearTimeout(hideTimer);
                        hideTimer = setTimeout(() => {
                            newsUi.classList.remove('show');
                        }, 7000); // 読み終わり後、7秒間表示して消す
                    }
                }
            }, speed);
        }

        // 🎬 報道シーケンスのメイン処理
        function playNewsSequence(titleText, descText) {
            clearTimeout(hideTimer);
            newsUi.classList.remove('show'); // 一度隠す
            
            // 1. BREAKING NEWS 特報を1.5秒出す
            breakingOverlay.classList.add('active');
            
            setTimeout(() => {
                breakingOverlay.classList.remove('active');
                
                // 2. バッジを左上の選択通りに適用
                updateBadgeStyle(badgeSelect.value);

                // 3. ニュースUIを表示し、カチカチタイピング開始
                newsUi.classList.add('show');
                tickerTitle.textContent = titleText;
                typeWriterEffect(tickerDesc, descText, 45);
                
            }, 1500);
        }

        // 🚨 3連スロット発射
        function triggerNewsStrike(slotNumber) {
            if (!isRunning) {
                alert('先に「放送システム起動」ボタンを押してください！');
                return;
            }
            const titleVal = document.getElementById(`custom-title-${slotNumber}`).value.trim();
            const descVal = document.getElementById(`custom-desc-${slotNumber}`).value.trim();

            if (titleVal !== "" && descVal !== "") {
                playNewsSequence(titleVal, descVal);
            } else {
                alert("見出しと詳細説明を入力してください！");
            }
        }

        // 🎲 おまかせ嘘ニュースガチャ
        btnRandom.addEventListener('click', () => {
            if (!isRunning) {
                alert('先に「放送システム起動」ボタンを押してください！');
                return;
            }
            // ランダムに1つ選ぶ
            const item = randomNewsDB[Math.floor(Math.random() * randomNewsDB.length)];
            
            // ガチャのときは、バッジもそれに合わせてちょっと遊ぶ（確率で変える）
            const r = Math.random();
            if (r < 0.3) badgeSelect.value = "速報";
            else if (r < 0.6) badgeSelect.value = "独自";
            else badgeSelect.value = "デマ";

            playNewsSequence(item.t, item.d);
        });

        // ⏱️ 経過時間タイマー
        function startClock() {
            startTime = Date.now();
            clockInterval = setInterval(() => {
                const elapsedMs = Date.now() - startTime;
                const totalSeconds = Math.floor(elapsedMs / 1000);
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                timerDisp.textContent = `⏱ ${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            }, 250);
        }

        // 🚀 放送開始・停止
        btnStart.addEventListener('click', () => {
            isRunning = true;
            btnStart.style.display = 'none';
            btnStop.style.display = 'block';
            statusDisp.textContent = "🔴 ON AIR（報道中）";
            startClock();
        });

        btnStop.addEventListener('click', () => {
            isRunning = false;
            btnStart.style.display = 'block';
            btnStop.style.display = 'none';
            statusDisp.textContent = "⏹ 放送休止";
            
            clearInterval(clockInterval);
            clearInterval(typeInterval);
            clearTimeout(hideTimer);
            
            breakingOverlay.classList.remove('active');
            newsUi.classList.remove('show');
        });
    </script>
</body>
</html>
