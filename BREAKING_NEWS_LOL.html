<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ありそうで無いニュース速報ジェネレーター【1行制限版】</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            overflow-x: hidden;
            font-family: 'Noto Sans JP', sans-serif;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 🎬 16:9 ビデオエリア（グリーンバック：横800px固定） */
        #video-area {
            position: relative;
            width: 800px;
            height: 450px;
            background-color: #00ff00; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            margin-top: 20px;
            overflow: hidden; 
            z-index: 1;
            max-width: 95vw;
            aspect-ratio: 16 / 9;
            height: auto;
            container-type: inline-size;
        }

        /* 🚨 演出1：BREAKING NEWS（特報） */
        #breaking-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(160, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }
        #breaking-overlay.active {
            opacity: 1;
            animation: flash-bg 0.5s ease infinite alternate;
        }
        
        .breaking-title {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 7.5cqw;
            color: #fff;
            text-shadow: 0 0.5cqw 2cqw rgba(0,0,0,0.6);
            letter-spacing: 0.6cqw;
            transform: scale(0.8);
        }
        .breaking-subtitle {
            font-size: 3cqw;
            color: #ffcc00;
            font-weight: 900;
            margin-top: 1.2cqw;
            letter-spacing: 0.4cqw;
        }
        #breaking-overlay.active .breaking-title {
            animation: zoom-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes flash-bg {
            0% { background: rgba(140, 0, 0, 0.95); }
            100% { background: rgba(200, 0, 0, 0.95); }
        }
        @keyframes zoom-in { to { transform: scale(1); } }

        /* 📺 演出2：ニュース番組UI */
        #news-ui-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 100;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #news-ui-container.show {
            display: block;
            opacity: 1;
        }

        /* 左上の報道バッジ */
        .news-badge {
            position: absolute;
            top: 2.5cqw;
            left: 3cqw;
            background: linear-gradient(135deg, #ffcc00, #ff9900);
            color: #000;
            font-weight: 900;
            font-size: 2.2cqw;
            padding: 0.4cqw 1.8cqw;
            border-radius: 0.4cqw;
            box-shadow: 0 0.4cqw 1cqw rgba(0,0,0,0.4);
            border: 0.1cqw solid #fff;
            transition: background 0.3s;
        }
        .badge-blue { background: linear-gradient(135deg, #00ccff, #0066cc) !important; color: #fff !important; }
        .badge-red { background: linear-gradient(135deg, #ff3333, #cc0000) !important; color: #fff !important; }
        .badge-purple { background: linear-gradient(135deg, #cc33ff, #8800cc) !important; color: #fff !important; }

        /* 右上のLIVEバッジ */
        .news-live-badge {
            position: absolute;
            top: 2.5cqw;
            right: 3cqw;
            background: #cc0000;
            color: #fff;
            font-weight: 900;
            font-size: 1.8cqw;
            padding: 0.4cqw 1.2cqw;
            border-radius: 0.2cqw;
            box-shadow: 0 0.4cqw 1cqw rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 0.6cqw;
        }
        .live-dot {
            width: 0.8cqw;
            height: 0.8cqw;
            background: #fff;
            border-radius: 50%;
            animation: pulse 0.8s infinite alternate;
        }
        @keyframes pulse { 0% { opacity: 0.3; } 100% { opacity: 1; } }

        /* 下部テロップ座布団 */
        .news-ticker-area {
            position: absolute;
            bottom: 3.5cqw;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            display: flex;
            flex-direction: column;
            gap: 0.6cqw;
        }

        /* 大見出し（赤座布団：1行スマート版へ回帰） */
        .ticker-main-row {
            background: linear-gradient(to right, #cc0000, #990000);
            color: #ffffff;
            font-size: 3.4cqw; 
            font-weight: 900;
            padding: 1cqw 2.2cqw;
            border-left: 1cqw solid #ffcc00;
            box-shadow: 0 0.6cqw 1.5cqw rgba(0,0,0,0.5);
            white-space: nowrap;
            overflow: hidden;
            letter-spacing: 0.1cqw;
            text-shadow: 0.2cqw 0.2cqw 0.3cqw rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
        }

        /* 詳細（白座布団） */
        .ticker-sub-row {
            background: rgba(255, 255, 255, 0.96);
            color: #111111;
            font-size: 2.2cqw;
            font-weight: 700;
            padding: 1.2cqw 2.2cqw;
            border-left: 1cqw solid #444;
            box-shadow: 0 0.6cqw 1.5cqw rgba(0,0,0,0.4);
            line-height: 1.4;
            letter-spacing: 0.05cqw;
        }

        /* 🛠️ コントロールパネル */
        #control-panel {
            width: 98vw;
            max-width: 1200px;
            height: calc(30vh - 30px);
            min-height: 190px;
            background: rgba(0, 0, 0, 0.95);
            margin: 10px 0;
            padding: 12px;
            box-sizing: border-box;
            border: 2px solid #cc0000;
            display: grid;
            grid-template-columns: 1.1fr 1.6fr 0.9fr; 
            gap: 15px;
            color: white;
            font-size: 13px;
        }

        .panel-section { display: flex; flex-direction: column; gap: 6px; border-right: 1px solid #333; padding-right: 15px; justify-content: center; }
        .panel-section:last-child { border-right: none; padding-right: 0; }
        .panel-section-title { color: #ff4444; font-weight: bold; font-size: 12px; border-bottom: 1px solid #444; padding-bottom: 4px; margin-bottom: 3px; }
        .checkbox-label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 11px; color: #ccc; }
        select, input[type="text"] { padding: 5px; background: #111; color: #fff; border: 1px solid #444; font-size: 12px; border-radius: 4px; box-sizing: border-box; }
        
        /* 入力列のレイアウト調整 */
        .strike-input-row { display: flex; gap: 6px; align-items: center; width: 100%; }
        .strike-input-row .in-t { flex: 1.5; position: relative; }
        .strike-input-row .in-d { flex: 2; }
        
        /* 💡 文字数カウンターの小さなバッジ */
        .count-badge { font-size: 9px; color: #888; position: absolute; right: 5px; top: -12px; }

        .manual-shoot-btn {
            background: linear-gradient(135deg, #cc0000, #880000);
            color: white;
            border: 1px solid #ff6666;
            border-radius: 4px;
            padding: 5px 12px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
        }
        .manual-shoot-btn:active { transform: scale(0.95); }

        #random-strike-btn {
            background: linear-gradient(135deg, #ff9900, #ff5500);
            color: white;
            border: 1px solid #fff;
            border-radius: 6px;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 100, 0, 0.3);
        }
        #random-strike-btn:active { transform: scale(0.96); }

        .action-btn { width: 100%; padding: 8px; font-size: 14px; font-weight: bold; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #start-btn { background-color: #0088ff; }
        #stop-btn { background-color: #ff3333; display: none; }

        .status-timer-container { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 2px; }
        #timer-disp { font-family: monospace; font-size: 14px; color: #ff4444; font-weight: bold; background: #111; padding: 2px 6px; border-radius: 3px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="video-area">
        
        <div id="breaking-overlay">
            <div class="breaking-title">BREAKING NEWS</div>
            <div class="breaking-subtitle">報道特報</div>
        </div>

        <div id="news-ui-container">
            <div class="news-badge" id="news-badge-text">速報</div>
            <div class="news-live-badge"><div class="live-dot"></div>LIVE</div>
            
            <div class="news-ticker-area">
                <div class="ticker-main-row"><span id="ticker-title">【速報】待機中</span></div>
                <div class="ticker-sub-row" id="ticker-desc">放送システムを起動してボタンを押してください。</div>
            </div>
        </div>

    </div>

    <div id="control-panel">
        
        <div class="panel-section">
            <div class="panel-section-title">⚙️ 自動 ＆ 表示オプション</div>
            <div>
                <label style="font-size:11px; color:#aaa;">報道バッジの種類:</label>
                <select id="badge-select" style="width: 100%; margin-top: 2px;">
                    <option value="速報">速報（標準・オレンジ）</option>
                    <option value="独自">独自（スクープ・オレンジ）</option>
                    <option value="中継">中継（現場から・青）</option>
                    <option value="警告">警告（注意喚起・赤）</option>
                    <option value="デマ">※デマ（ネタ動画用・紫）</option>
                </select>
            </div>
            <label class="checkbox-label" style="margin-top: 5px;">
                <input type="checkbox" id="enable-auto-hide" checked> ⏱️ 7秒後にテロップを自動格納する
            </label>
            <button id="random-strike-btn" style="margin-top: auto;">🎲 おまかせ嘘ニュース発射！</button>
        </div>

        <div class="panel-section">
            <div class="panel-section-title">🚨 事前入力ニュース（見出しは最大35文字まで）</div>
            
            <div class="strike-input-row" style="position:relative;">
                <span class="count-badge" id="cb-1">0/35</span>
                <input type="text" class="in-t" id="custom-title-1" maxlength="35" value="【速報】世界初の1行絶対死守テロップシステムが遂に完成" placeholder="見出し(35字)">
                <input type="text" class="in-d" id="custom-desc-1" value="文字数上限を35文字にロック。フォント自動縮小機能と組み合わせることで、どんな環境でも1行に美しく収まります。" placeholder="詳細説明">
                <button class="manual-shoot-btn" onclick="triggerNewsStrike(1)">報道 💥</button>
            </div>
            
            <div class="strike-input-row" style="position:relative;">
                <span class="count-badge" id="cb-2">0/35</span>
                <input type="text" class="in-t" id="custom-title-2" maxlength="35" value="【大論争】「何でもいい」の正解見つからず" placeholder="見出し(35字)">
                <input type="text" class="in-d" id="custom-desc-2" value="今日の夕飯について「何でもいい」と言った妻に対し、提案した全候補が却下され現場は緊迫しています。" placeholder="詳細説明">
                <button class="manual-shoot-btn" onclick="triggerNewsStrike(2)">報道 💥</button>
            </div>
            
            <div class="strike-input-row" style="position:relative;">
                <span class="count-badge" id="cb-3">0/35</span>
                <input type="text" class="in-t" id="custom-title-3" maxlength="35" value="【速報】全国のオカン、一斉に「あれ」を発動" placeholder="見出し(35字)">
                <input type="text" class="in-d" id="custom-desc-3" value="「あれをあれして」の指示に対し、家族側は高度な言語解読を求められる事態となっています。" placeholder="詳細説明">
                <button class="manual-shoot-btn" onclick="triggerNewsStrike(3)">報道 💥</button>
            </div>
        </div>

        <div class="panel-section">
            <div class="panel-section-title">▶ 放送システム制御</div>
            <div style="width:100%; display:flex; flex-direction:column; gap:4px;">
                <button id="start-btn" class="action-btn">放送システム起動 🚀</button>
                <button id="stop-btn" class="action-btn">放送終了（一時停止） 🛑</button>
            </div>
            <div class="status-timer-container">
                <div id="status-disp" style="font-size: 11px; color: #888;">待機中</div>
                <div id="timer-disp">⏱ 00:00</div>
            </div>
        </div>

    </div>

    <script>
        const randomNewsDB = [
            { t: "【速報】本日のタイムライン、流れてくる情報がすべて虚無と判明", d: "有識者は「スマホを置いて今すぐ美味しいものを食べ、暖かくして寝るのが人類にとって最善の選択肢である」と強い警告を発しています。" },
            { t: "【悲報】週明けの月曜日、誰の許可を得て始まったのか物議に", d: "政府や関係各所への取材を進めていますが、現時点で月曜日が開始された明確な理由は判明していません。" },
            { t: "【密着】テレビのリモコン、またもやソファの隙間で発見される", d: "捜索隊は「無意識のうちに吸い込まれる未知の引力が、あの隙間には働いている」と強い警戒を呼びかけています。" },
            { t: "【衝撃】「ちょっと何言ってるか分からない」と鳴く珍鳥", d: "東北地方を中心に目撃情報が相次いでおり、有識者は「ただのサンドウィッチマンのファンではないか」とみています。" },
            { t: "【悲報】ポテトチップス、中身のほぼ8割が「空気」だと判明", d: "開けた瞬間の絶望感について、製造元は「ポテトの鮮度と、開けた瞬間のワクワクを守るための愛です」と回答しました。" }
        ];

        const breakingOverlay = document.getElementById('breaking-overlay');
        const newsUi = document.getElementById('news-ui-container');
        const tickerTitle = document.getElementById('ticker-title');
        const tickerDesc = document.getElementById('ticker-desc');
        const badgeSelect = document.getElementById('badge-select');
        const badgeText = document.getElementById('news-badge-text');
        const chkAutoHide = document.getElementById('enable-auto-hide');
        
        const btnRandom = document.getElementById('random-strike-btn');
        const btnStart = document.getElementById('start-btn');
        const btnStop = document.getElementById('stop-btn');
        const statusDisp = document.getElementById('status-disp');
        const timerDisp = document.getElementById('timer-disp');

        let isRunning = false;
        let startTime = 0;
        let clockInterval = null;
        let typeInterval = null;
        let hideTimer = null;

        function updateBadgeStyle(type) {
            badgeText.textContent = type;
            badgeText.className = "news-badge";
            if (type === "中継") badgeText.classList.add('badge-blue');
            if (type === "警告") badgeText.classList.add('badge-red');
            if (type === "デマ") badgeText.classList.add('badge-purple');
        }

        /* 💡 復活したフォント自動縮小（1行死守バージョン） */
        function adjustTitleFontSize() {
            const parent = tickerTitle.parentElement; 
            let fontSize = 3.4; // 初期サイズ
            tickerTitle.style.fontSize = fontSize + 'cqw';
            
            // 最大幅に収まるまでじわじわ縮小
            const maxWidth = parent.clientWidth * 0.94;
            while (tickerTitle.scrollWidth > maxWidth && fontSize > 1.2) {
                fontSize -= 0.1;
                tickerTitle.style.fontSize = fontSize + 'cqw';
            }
        }

        /* 💡 入力欄の文字数を監視してリアルタイム表示する処理 */
        function initCounter(inputIdx) {
            const input = document.getElementById(`custom-title-${inputIdx}`);
            const badge = document.getElementById(`cb-${inputIdx}`);
            
            const updateCount = () => {
                badge.textContent = `${input.value.length}/35`;
                if(input.value.length >= 35) {
                    badge.style.color = '#ff4444';
                } else {
                    badge.style.color = '#888';
                }
            };
            
            input.addEventListener('input', updateCount);
            updateCount(); // 初期化
        }
        for(let i=1; i<=3; i++) initCounter(i);

        function typeWriterEffect(element, text, speed = 40) {
            clearInterval(typeInterval);
            element.textContent = "";
            let i = 0;
            
            typeInterval = setInterval(() => {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                } else {
                    clearInterval(typeInterval);
                    if (chkAutoHide.checked) {
                        clearTimeout(hideTimer);
                        hideTimer = setTimeout(() => {
                            newsUi.classList.remove('show');
                        }, 7000);
                    }
                }
            }, speed);
        }

        function playNewsSequence(titleText, descText) {
            clearTimeout(hideTimer);
            newsUi.classList.remove('show');
            
            breakingOverlay.classList.add('active');
            
            setTimeout(() => {
                breakingOverlay.classList.remove('active');
                updateBadgeStyle(badgeSelect.value);
                newsUi.classList.add('show');
                
                tickerTitle.textContent = titleText;
                adjustTitleFontSize(); 
                
                typeWriterEffect(tickerDesc, descText, 45);
            }, 1500);
        }

        function triggerNewsStrike(slotNumber) {
            if (!isRunning) {
                alert('先に「放送システム起動」ボタンを押してください！');
                return;
            }
            const titleVal = document.getElementById(`custom-title-${slotNumber}`).value.trim();
            const descVal = document.getElementById(`custom-desc-${slotNumber}`).value.trim();

            if (titleVal !== "" && descVal !== "") {
                playNewsSequence(titleVal, descVal);
            } else {
                alert("見出しと詳細説明を入力してください！");
            }
        }

        btnRandom.addEventListener('click', () => {
            if (!isRunning) {
                alert('先に「放送システム起動」ボタンを押してください！');
                return;
            }
            const item = randomNewsDB[Math.floor(Math.random() * randomNewsDB.length)];
            const r = Math.random();
            if (r < 0.3) badgeSelect.value = "速報";
            else if (r < 0.6) badgeSelect.value = "独自";
            else badgeSelect.value = "デマ";

            playNewsSequence(item.t, item.d);
        });

        function startClock() {
            startTime = Date.now();
            clockInterval = setInterval(() => {
                const elapsedMs = Date.now() - startTime;
                const totalSeconds = Math.floor(elapsedMs / 1000);
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                timerDisp.textContent = `⏱ ${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            }, 250);
        }

        btnStart.addEventListener('click', () => {
            isRunning = true;
            btnStart.style.display = 'none';
            btnStop.style.display = 'block';
            statusDisp.textContent = "🔴 ON AIR（報道中）";
            startClock();
        });

        btnStop.addEventListener('click', () => {
            isRunning = false;
            btnStart.style.display = 'block';
            btnStop.style.display = 'none';
            statusDisp.textContent = "⏹ 放送休止";
            
            clearInterval(clockInterval);
            clearInterval(typeInterval);
            clearTimeout(hideTimer);
            
            breakingOverlay.classList.remove('active');
            newsUi.classList.remove('show');
        });
    </script>
</body>
</html>
