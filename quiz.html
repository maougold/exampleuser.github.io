<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>💛 HAPPY PROTOCOL 💛 | ULTIMATE CUTE</title>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
    <style>
        body {
            /* 明るいスカイブルーのグラデーション */
            background: radial-gradient(circle, #e0f7fa 0%, #81d4fa 100%);
            color: #444; /* 文字色は少し柔らかい黒 */
            font-family: 'Kosugi Maru', "Helvetica Neue", Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            display: flex;
            width: 95%;
            max-width: 1100px;
            gap: 30px;
            align-items: flex-end;
        }

        #main-area { flex: 3; display: flex; flex-direction: column; align-items: center; }
        #menu-screen, #game-ui, #success-screen { display: none; width: 100%; text-align: center; }

        /* ポップなメニューボタン */
        .menu-btn {
            display: block; width: 100%; margin: 15px 0; padding: 20px;
            font-size: 22px; font-weight: bold; border-radius: 50px;
            cursor: pointer; transition: 0.3s ease;
            background: #fff; border: 4px solid #ff80ab; color: #ff80ab;
            box-shadow: 0 6px 0 #ff80ab; /* ぷっくり感 */
            position: relative; top: 0;
        }
        .menu-btn:hover { 
            background: #ff80ab; color: #fff; top: 3px; box-shadow: 0 3px 0 #ff80ab;
        }

        /* ふんわりした問題ボックス */
        #question-box {
            width: 100%; padding: 40px; margin-bottom: 30px; font-size: 24px; line-height: 1.6;
            background: #fff;
            border: 6px solid #81d4fa; border-radius: 40px;
            box-sizing: border-box; color: #333;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .answer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; }
        /* 丸っこい回答ボタン */
        .answer-btn {
            background: #fff; border: 3px solid #b3e5fc; border-radius: 40px; padding: 18px 25px;
            color: #555; font-size: 20px; text-align: left; cursor: pointer; 
            transition: 0.2s; position: relative; top: 0;
            box-shadow: 0 4px 0 #b3e5fc;
        }
        .answer-btn:hover:not(.hidden-opt) { 
            background: #ffecb3; border-color: #ffca28; color: #827717; 
            top: 2px; box-shadow: 0 2px 0 #ffca28;
        }
        .label { color: #ff80ab; font-weight: bold; margin-right: 15px; font-size: 22px;}
        .hidden-opt { visibility: hidden; pointer-events: none; }

        /* 明るいサイドバー */
        #sidebar {
            flex: 1;
            background: rgba(255, 255, 255, 0.9);
            border: 4px solid #ff80ab;
            border-radius: 30px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            min-width: 220px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* キュートな賞金ラダー */
        .money-step {
            display: flex; justify-content: space-between; padding: 6px 15px;
            font-family: 'Courier New', monospace; color: #ff80ab; font-size: 18px;
            border-radius: 15px; margin-bottom: 3px; font-weight: bold;
        }
        .current-step { 
            background: #ff80ab; color: #fff; font-weight: bold; 
            box-shadow: 0 0 15px rgba(255, 128, 171, 0.7);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        .passed-step { color: #b3e5fc; opacity: 0.6; }

        .lifeline-area { display: flex; justify-content: space-around; margin-bottom: 25px; }
        /* 丸いライフラインボタン */
        .lifeline-btn {
            width: 65px; height: 65px; border-radius: 50%; border: 4px solid #fff;
            background: linear-gradient(135deg, #ff80ab, #ff4081); color: #fff;
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }
        .lifeline-btn:hover:not(.used) { transform: rotate(10deg) scale(1.1); background: #fff; color: #ff4081; border-color: #ff4081;}
        .lifeline-btn.used { opacity: 0.2; cursor: default; text-decoration: line-through; transform: scale(0.9);}

        #walk-away-btn {
            margin-top: 30px; background: #ffebee; color: #ef5350; border: 2px solid #ef5350;
            padding: 12px 30px; border-radius: 30px; cursor: pointer; font-size: 16px; font-weight: bold;
            transition: 0.3s;
        }
        #walk-away-btn:hover { background: #ef5350; color: #fff; }

        /* ロケット演出をかわいく */
        .rocket-trigger { font-size: 120px; cursor: pointer; position: relative; display: inline-block; transition: 0.3s; }
        .rocket-trigger:hover { transform: scale(1.1); }
        .rocket-anim { position: absolute; bottom: 0; left: 0; opacity: 0; transform: rotate(45deg); font-size: 80px; }
        .launch .rocket-anim { animation: launchDiagonal Cute 1.8s ease-in forwards; }
        @keyframes launchDiagonalCute {
            0% { transform: translate(0,0) rotate(45deg); opacity: 1; }
            20% { transform: translate(-10px, 10px) rotate(45deg); } /* 少し溜める */
            100% { transform: translate(1200px, -1200px) rotate(45deg); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="main-area">
        <div id="menu-screen" style="display: block;">
            <h1 style="color: #ff4081; text-shadow: 0 4px 0 #fff; font-size: 42px;">⭐ SELECT STAGE ⭐</h1>
            <button class="menu-btn" onclick="startGame('EASY')">EASY ✨ [直感でポン！]</button>
            <button class="menu-btn" onclick="startGame('NORMAL')">NORMAL 💡 [生活の知恵袋]</button>
            <button class="menu-btn" onclick="startGame('HARD')">HARD 🔥 [世界のフシギ]</button>
        </div>

        <div id="game-ui">
            <div id="question-box">ここに問題文が表示されます</div>
            <div class="answer-grid">
                <button class="answer-btn" id="btn-A" onclick="checkAnswer('A')"><span class="label">A</span> <span id="opt-A"></span></button>
                <button class="answer-btn" id="btn-B" onclick="checkAnswer('B')"><span class="label">B</span> <span id="opt-B"></span></button>
                <button class="answer-btn" id="btn-C" onclick="checkAnswer('C')"><span class="label">C</span> <span id="opt-C"></span></button>
                <button class="answer-btn" id="btn-D" onclick="checkAnswer('D')"><span class="label">D</span> <span id="opt-D"></span></button>
            </div>
            <button id="walk-away-btn" onclick="walkAway()">ここまでにする (賞金をゲット💖)</button>
        </div>

        <div id="success-screen">
            <h1 id="success-title" style="color: #ff4081; font-size: 48px; text-shadow: 0 4px 0 #fff;">💖 MISSION COMPLETE 💖</h1>
            <div class="rocket-trigger" id="finalBtn">
                <span id="heart-icon" style="color: #ff4081;">❤</span>
                <span class="rocket-anim">🚀</span>
            </div>
            <p id="reward-display" style="font-size: 20px; color: #555;">真実が世界中に拡散されました！</p>
        </div>
    </div>

    <div id="sidebar">
        <div class="lifeline-area">
            <button id="fifty-fifty" class="lifeline-btn" onclick="useFiftyFifty()">50:50</button>
            <button id="phone" class="lifeline-btn" onclick="usePhone()">💌</button>
            <button id="audience" class="lifeline-btn" onclick="useAudience()">✨</button>
        </div>
        <div id="audience-chart" style="display:none; margin-bottom:15px; background:#fff; padding:15px; border:3px solid #ffca28; border-radius:15px; font-size:12px; color:#333; box-shadow: 0 5px 10px rgba(0,0,0,0.1);"></div>
        <div id="money-ladder"></div>
    </div>
</div>

<script>
// 音源はそのまま活用
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playFreq(f, d, v=0.1) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = 'sine'; // 柔らかい音に
    o.frequency.value = f; g.gain.value = v;
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + d);
}

const moneyList = ["10,000", "20,000", "30,000", "50,000", "100,000", "250,000", "500,000", "1,000,000", "2,500,000", "10,000,000"];

// クイズデータはそのまま活用
const quizData = {
    EASY: [
        { q: "リンゴが3つありました。そこから2つ取ったら、あなたの手元にはリンゴは何個ある？", a: "1個", b: "2個", c: "3個", d: "0個", ans: "B" },
        { q: "1年の中で「28日」がある月はいくつある？", a: "1つ", b: "うるう年だけ", c: "12個すべて", d: "0個", ans: "C" },
        { q: "日本の「50円硬貨」に描かれている花の種類は？", a: "桜", b: "菊", c: "梅", d: "パンジー", ans: "B" },
        { q: "聖徳太子が生きていた頃、本人は周りから何と呼ばれていた？", a: "厩戸皇子", b: "聖徳さん", c: "十七条の憲法", d: "お札の人", ans: "A" },
        { q: "一階建ての「青い家」があります。家具も壁もすべて青。さて、階段は何色？", a: "青色", b: "白色", c: "透明", d: "階段はない", ans: "D" },
        { q: "日本で一番「南」にある都道府県はどこ？", a: "鹿児島県", b: "沖縄県", c: "東京都", d: "高知県", ans: "C" },
        { q: "「1アウト、ランナー満塁」。バッターがホームランを打ったら、何点入る？", a: "3点", b: "4点", c: "1点", d: "0点", ans: "B" },
        { q: "レースで「2位の人」を追い越しました。あなたの順位は何位？", a: "1位", b: "2位", c: "3位", d: "リタイア", ans: "B" },
        { q: "エベレストが発見される前、世界で一番高かった山は何？", a: "富士山", b: "K2", c: "キリマンジャロ", d: "エベレスト", ans: "D" },
        { q: "このクイズの「第1問」の正解の数字は何だった？", a: "1", b: "2", c: "3", d: "0", ans: "B" }
    ],
    NORMAL: [
        { q: "食パンの袋を留めている「あのプラスチックの留め具」。正式名称は？", a: "クロージャー", b: "クイック・ロック", c: "バッグ・クロージャー", d: "パン・クリップ", ans: "C" },
        { q: "かき氷シロップのイチゴ、メロン、ブルーハワイ。味のベース以外で唯一違うのは？", a: "糖分の量", b: "酸味の成分", c: "色と香料", d: "氷の削り方", ans: "C" },
        { q: "明治時代、最初に導入された時の「郵便ポスト」の色は何色だった？", a: "黒色", b: "白色", c: "青色", d: "金色", ans: "A" },
        { q: "救急車のサイレン「ピーポー」。ピーとポーで物理的に違うのは？", a: "音量", b: "周波数(音の高さ)", c: "音の波長", d: "スピーカーの数", ans: "B" },
        { q: "レトルトカレーの「レトルト」とは、オランダ語でどういう意味？", a: "保存食", b: "蒸気調理", c: "加圧加熱殺菌釜", d: "魔法の袋", ans: "C" },
        { q: "トランプの4人のキングの中で、1人だけ「口ひげ」がないのは？", a: "スペード", b: "ハート", c: "ダイヤ", d: "クラブ", ans: "B" },
        { q: "日本で最も普及し、売れている「乾電池」のサイズは？", a: "単1形", b: "単2形", c: "単3形", d: "単4形", ans: "C" },
        { q: "非常口マークの「走っている人」。このピクトグラムの公式愛称は？", a: "エスケープくん", b: "ピクトさん", c: "ランニングマン", d: "名前はない", ans: "B" },
        { q: "一般的な銀行ATM1台の中に、最大でいくらまで現金が入る？", a: "1000万円", b: "3000万円", c: "1億円", d: "5億円", ans: "C" },
        { q: "ゆで卵を綺麗にむくには、茹でる直前に卵のどこに穴を開けるのが正解？", a: "尖っている方", b: "側面", c: "丸い方", d: "どこでもいい", ans: "C" }
    ],
    HARD: [
        { q: "冷戦後、NATOが歴史上で初めて「集団自衛権(第5条)」を発動した契記は？", a: "イラク戦争", b: "アフガン侵攻", c: "9.11米同時多発テロ", d: "コソボ紛争", ans: "C" },
        { q: "国連安保理常任理事国の中で、一度も拒否権を行使していない国は？", a: "フランス", b: "中国", c: "イギリス", d: "存在しない", ans: "D" },
        { q: "EU法が加盟国の国内法に対して優先される原則を確立した歴史的判決は？", a: "コスタ対ENEL判決", b: "リスボン条約判決", c: "マーストリヒト判決", d: "パリ条約判決", ans: "A" },
        { q: "国家承認はないが実質的国家機能を持ちイスラエルと対峙する主体とその後ろ盾は？", a: "タリバン＋中国", b: "ハマス＋イラン", c: "フーシ派＋ロシア", d: "クルド＋アメリカ", ans: "B" },
        { q: "2020年ロシア憲法改正においてプーチン政権が得た最大の実質的効果は？", a: "上下院廃止", b: "任期リセットによる長期政権合法化", c: "直接選挙廃止", d: "核使用権の拡大", ans: "B" },
        { q: "米大統領選で、勝利が法的に確定する最も重要な「確定日」は？", a: "11月の一般投票日", b: "12月の選挙人団投票日", c: "1月の就任式", d: "予備選終了日", ans: "B" },
        { q: "中国共産党文書で使われる「核心(コア)」という言葉の実質的意味は？", a: "最大派閥代表者", b: "形式的象徴", c: "最終裁定権を持つ不可侵の指導的地位", d: "軍事事務責任者", ans: "C" },
        { q: "近年のアフリカでのクーデターに共通する対外関係の変化は？", a: "英離脱＋中接近", b: "仏離脱＋露接近", c: "米離脱＋イラン接近", d: "EU離脱＋トルコ接近", ans: "B" },
        { q: "イスラエルが現在も「成文憲法」を持たない最大の政治的理由は？", a: "世俗派と宗教派の対立", b: "建国時の時間不足", c: "イギリスの禁止", d: "国連の要請", ans: "A" },
        { q: "国家主権と人権介入が衝突する際に掲げられる象徴的原則は？", a: "集団自衛権", b: "民族自決", c: "勢力均衡", d: "責任ある保護(R2P)", ans: "D" }
    ]
};

let currentLevel = '';
let currentStep = 0;
let fiftyUsed = false;
let phoneUsed = false;
let audienceUsed = false;

// ロジックはそのまま活用
function startGame(lv) {
    currentLevel = lv;
    currentStep = 0;
    fiftyUsed = false;
    phoneUsed = false;
    audienceUsed = false;
    document.getElementById('fifty-fifty').classList.remove('used');
    document.getElementById('phone').classList.remove('used');
    document.getElementById('audience').classList.remove('used');
    document.getElementById('audience-chart').style.display = 'none';
    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById('game-ui').style.display = 'block';
    initLadder();
    updateView();
}

function initLadder() {
    const ladder = document.getElementById('money-ladder');
    ladder.innerHTML = '';
    for (let i = moneyList.length - 1; i >= 0; i--) {
        const div = document.createElement('div');
        div.id = `step-${i}`;
        div.className = 'money-step';
        div.innerHTML = `<span>STEP ${i + 1}</span> <span>¥${moneyList[i]}</span>`;
        ladder.appendChild(div);
    }
}

function updateView() {
    if (currentStep >= 10) {
        showResult(moneyList[9]);
        return;
    }
    for (let i = 0; i < 10; i++) {
        const el = document.getElementById(`step-${i}`);
        el.className = 'money-step';
        if (i === currentStep) el.classList.add('current-step');
        else if (i < currentStep) el.classList.add('passed-step');
    }

    const data = quizData[currentLevel][currentStep];
    document.getElementById('question-box').innerText = data.q;
    const btnIds = ['btn-A', 'btn-B', 'btn-C', 'btn-D'];
    const opts = ['a', 'b', 'c', 'd'];
    
    btnIds.forEach((id, idx) => {
        const btn = document.getElementById(id);
        btn.classList.remove('hidden-opt');
        document.getElementById('opt-' + (id.split('-')[1])).innerText = data[opts[idx]];
    });
}

function checkAnswer(pick) {
    playFreq(660, 0.05); // 少し高い音に
    if (confirm("これで決定？ (ファイナルアンサー？)")) {
        if (pick === quizData[currentLevel][currentStep].ans) {
            playFreq(1200, 0.3); // キラーンとする音
            alert("すごーい！正解💖");
            currentStep++;
            updateView();
        } else {
            playFreq(220, 0.6); // ざんねんな音
            alert("ざんねん... また挑戦してね！");
            location.reload();
        }
    }
}

function useFiftyFifty() {
    if (fiftyUsed || currentStep >= 10) return;
    fiftyUsed = true;
    document.getElementById('fifty-fifty').classList.add('used');
    const correct = quizData[currentLevel][currentStep].ans;
    const options = ['A', 'B', 'C', 'D'].filter(opt => opt !== correct);
    for (let i = 0; i < 2; i++) {
        const idx = Math.floor(Math.random() * options.length);
        const target = options.splice(idx, 1)[0];
        document.getElementById(`btn-${target}`).classList.add('hidden-opt');
    }
}

function usePhone() {
    if (phoneUsed || currentStep >= 10) return;
    phoneUsed = true;
    document.getElementById('phone').classList.add('used');
    const correct = quizData[currentLevel][currentStep].ans;
    alert(`【💌 こっそりメッセージ受信】\n\n「…たぶん答えは ${correct} だと思うにゃ。信じるかはあなた次第！」`);
}

function useAudience() {
    if (audienceUsed || currentStep >= 10) return;
    audienceUsed = true;
    document.getElementById('audience').classList.add('used');
    const correct = quizData[currentLevel][currentStep].ans;
    const chart = document.getElementById('audience-chart');
    chart.style.display = 'block';
    let rates = { A: 10, B: 10, C: 10, D: 10 };
    rates[correct] = 60 + Math.floor(Math.random() * 15);
    let html = '<div style="color:#ff80ab; font-weight:bold; margin-bottom:5px;">✨ みんなの予想 ✨</div>';
    ['A', 'B', 'C', 'D'].forEach(opt => {
        html += `<div style="display:flex; align-items:center; margin:3px 0;">
                    <span style="width:18px; font-weight:bold; color:#555;">${opt}</span>
                    <div style="background:#81d4fa; height:12px; border-radius:6px; width:${rates[opt]}px; margin:0 8px; box-shadow:inset 0 2px 3px rgba(0,0,0,0.1);"></div>
                    <span style="color:#777;">${rates[opt]}%</span>
                 </div>`;
    });
    chart.innerHTML = html;
}

function walkAway() {
    if (currentStep === 0) { alert("まずは第1問に挑戦してね！"); return; }
    const prize = moneyList[currentStep - 1];
    if (confirm(`現在の実績 ¥${prize} をゲットして、ハッピーに辞めますか？`)) {
        showResult(prize);
    }
}

/* --- スロット連携機能 (ロジック維持) --- */
function syncPrizeToSlot(prizeStr) {
    const prizeAmount = parseInt(prizeStr.replace(/,/g, ''));
    let currentBalance = parseInt(localStorage.getItem('ev_coin_balance')) || 1000;
    const newBalance = currentBalance + prizeAmount;
    localStorage.setItem('ev_coin_balance', newBalance);
}

function showResult(amount) {
    document.getElementById('game-ui').style.display = 'none';
    const res = document.getElementById('success-screen');
    res.style.display = 'block';
    
    // スロットへ送金
    syncPrizeToSlot(amount);
    
    document.getElementById('reward-display').innerText = `獲得実績: ¥${amount}💖 ／ スロットの残高に転送されました。`;
    if (currentLevel === 'HARD') {
        document.getElementById('success-title').innerText = "⭐ GOLDEN HAPPY MASTER ⭐";
        document.getElementById('success-title').style.color = "#ffca28";
        document.getElementById('success-title').style.textShadow = "0 4px 0 #fff, 0 0 15px #ffca28";
    }
}

// 最後のボタン処理 (アニメーション名を Cute 版に変更)
document.getElementById('finalBtn').onclick = function() {
    this.classList.add('launch');
    playFreq(400, 0.1); 
    setTimeout(()=> playFreq(600, 0.1), 150);
    setTimeout(()=> playFreq(800, 0.3), 300); // ドレミ♪

    setTimeout(() => {
        alert("🛰 情報拡散完了💖 稼いだ賞金を持ってスロットへ移動しますにゃ！");
        window.location.href = "77777.html"; 
    }, 2000);
};
</script>
</body>
</html>
