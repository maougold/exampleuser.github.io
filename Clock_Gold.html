<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Golden Star Terminal - Fixed 3D</title>
    <style>
        :root {
            --gold: #FFD700;
            --gold-bright: #FFF5A0;
            --gold-dim: rgba(255, 215, 0, 0.3);
            --bg: #0d1117;
        }

        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: var(--bg); display: flex;
            justify-content: center; align-items: center;
            height: 100vh; perspective: 1000px;
            font-family: 'Courier New', Courier, monospace;
        }
        
        #bg { position: absolute; top: 0; left: 0; z-index: -1; opacity: 0.4; }
        
        .star-entity {
            position: absolute; font-size: 2.5rem;
            transition: transform 0.2s linear;
            pointer-events: none; z-index: -1;
            filter: drop-shadow(0 0 15px var(--gold)) brightness(1.5);
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spin-active { animation: spin 0.5s infinite linear !important; }

        .clock-container {
            text-align: center; border: 4px solid var(--gold);
            padding: 40px 60px; background: rgba(0, 0, 0, 0.9);
            border-radius: 30px; box-shadow: 0 0 60px rgba(255, 215, 0, 0.5);
            /* transitionを transform に適用して戻る動きをスムーズに */
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), border-color 0.3s, box-shadow 0.3s;
            pointer-events: auto; backdrop-filter: blur(12px);
        }

        .alarm-on {
            border-color: var(--gold-bright) !important;
            box-shadow: 0 0 100px var(--gold) !important;
            background: rgba(40, 30, 0, 0.95) !important;
        }

        #date { font-size: 1.6rem; color: var(--gold); margin-bottom: 10px; text-shadow: 0 0 10px var(--gold); }
        #clock { font-size: 8rem; font-weight: bold; color: var(--gold); text-shadow: 0 0 35px var(--gold); line-height: 1; }

        .weather-info {
            display: flex; justify-content: center; gap: 40px;
            margin-top: 20px; padding-top: 20px; border-top: 1px dashed var(--gold-dim);
            color: var(--gold);
        }
        .info-item { display: flex; flex-direction: column; align-items: center; }
        .label { font-size: 0.8rem; letter-spacing: 2px; opacity: 0.8; }
        .val { font-size: 2.2rem; font-weight: bold; color: #fff; text-shadow: 0 0 15px var(--gold); }

        .alarm-setting { margin-top: 25px; color: var(--gold); border-top: 1px solid var(--gold-dim); padding-top: 20px; }
        input[type="time"] {
            background: #111; border: 2px solid var(--gold); color: var(--gold);
            font-family: inherit; font-size: 1.4rem; padding: 5px 10px; border-radius: 8px; outline: none;
        }

        .controls { position: absolute; bottom: 30px; right: 30px; display: flex; gap: 15px; }
        .ui-btn {
            padding: 12px 24px; background: rgba(0,0,0,0.7); color: var(--gold);
            border: 2px solid var(--gold); cursor: pointer; border-radius: 8px;
            font-family: inherit; font-weight: bold; transition: 0.3s;
        }
        .ui-btn:hover { background: rgba(255, 215, 0, 0.25); box-shadow: 0 0 20px var(--gold); }
        .ui-btn.active { background: var(--gold); color: #000; }
        
        #stopBtn { 
            display: none; background: #fff; color: #000; border-color: var(--gold); 
            font-size: 1.2rem; padding: 15px 30px; box-shadow: 0 0 30px #fff;
        }
    </style>
</head>
<body>

    <canvas id="bg"></canvas>

    <div class="clock-container" id="container">
        <div id="date">SYNCING...</div>
        <div id="clock">00:00:00</div>

        <div class="weather-info">
            <div class="info-item"><span class="label">WEATHER</span><span id="weather-text" class="val">--</span></div>
            <div class="info-item"><span class="label">TEMPERATURE</span><span id="temp-val" class="val">--°C</span></div>
        </div>

        <div class="alarm-setting">
            <span class="label">ALARM </span>
            <input type="time" id="alarmTime">
            <button class="ui-btn" id="stopBtn">STOP STAR ALARM</button>
        </div>
    </div>

    <div class="controls">
        <button class="ui-btn" id="soundToggle">SOUND: OFF</button>
        <button class="ui-btn" id="tiltToggle">3D: OFF</button>
    </div>

    <script>
        let audioCtx = null;
        let isSoundEnabled = false;
        let isTiltEnabled = false;
        let isStarMode = false;
        let isAlarmRinging = false;
        let alarmTimeout = null;

        const stars = [];
        class Star {
            constructor() {
                this.el = document.createElement('div');
                this.el.className = 'star-entity';
                this.el.textContent = '⭐️';
                document.body.appendChild(this.el);
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = 0.6 + Math.random() * 0.8;
                this.turnSpeed = (Math.random() - 0.5) * 0.01;
            }
            update() {
                if (this.x < 50 || this.x > window.innerWidth - 50) this.angle = Math.PI - this.angle;
                if (this.y < 50 || this.y > window.innerHeight - 50) this.angle = -this.angle;
                this.angle += this.turnSpeed;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                this.el.style.left = `${this.x}px`;
                this.el.style.top = `${this.y}px`;
                if (isAlarmRinging) {
                    this.el.classList.add('spin-active');
                } else {
                    this.el.classList.remove('spin-active');
                    this.el.style.transform = `rotate(${Math.sin(this.angle)*20}deg)`;
                }
            }
        }
        for (let i = 0; i < 15; i++) stars.push(new Star());

        function playTone(freq, duration, volume, type = 'sine') {
            if (!audioCtx || !isSoundEnabled) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function updateClock() {
            const now = new Date();
            const currentTime = now.toTimeString().slice(0, 5);
            const s = now.getSeconds();
            document.getElementById('date').textContent = now.toLocaleDateString('ja-JP', {year:'numeric', month:'2-digit', day:'2-digit', weekday:'short'});
            document.getElementById('clock').textContent = now.toTimeString().split(' ')[0];
            const setAlarm = document.getElementById('alarmTime').value;
            if (setAlarm === currentTime && s === 0 && !isAlarmRinging) startAlarm();
            if (now.getMinutes() === 0 && s === 0 && !isAlarmRinging) triggerStarRain(10000);
            if (isSoundEnabled && !isAlarmRinging) playTone(1500, 0.04, 0.08);
        }

        function triggerStarRain(ms) {
            isStarMode = true;
            playTone(880, 0.3, 0.4, 'triangle');
            setTimeout(() => playTone(1760, 0.6, 0.5, 'triangle'), 150);
            setTimeout(() => { if(!isAlarmRinging) isStarMode = false; }, ms);
        }

        function startAlarm() {
            isAlarmRinging = true;
            isStarMode = true;
            document.getElementById('container').classList.add('alarm-on');
            document.getElementById('stopBtn').style.display = 'inline-block';
            document.getElementById('alarmTime').style.display = 'none';
            const ring = setInterval(() => {
                if (!isAlarmRinging) { clearInterval(ring); return; }
                playTone(1200, 0.2, 0.5, 'square');
                setTimeout(() => playTone(1800, 0.2, 0.5, 'square'), 250);
            }, 500);
            alarmTimeout = setTimeout(stopAlarm, 180000);
        }

        function stopAlarm() {
            isAlarmRinging = false;
            isStarMode = false;
            clearTimeout(alarmTimeout);
            document.getElementById('container').classList.remove('alarm-on');
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('alarmTime').style.display = 'inline-block';
            document.getElementById('alarmTime').value = "";
        }

        document.getElementById('stopBtn').onclick = stopAlarm;

        const canvas = document.getElementById('bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width / 16)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(13, 17, 23, 0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#FFD700';
            ctx.font = isStarMode ? "24px serif" : "15px monospace";
            drops.forEach((y, i) => {
                const text = isStarMode ? "⭐" : String.fromCharCode(Math.random() * 128);
                if (isStarMode) { ctx.shadowBlur = 15; ctx.shadowColor = "#FFD700"; }
                else { ctx.shadowBlur = 0; }
                ctx.fillText(text, i * 16, y * 16);
                if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }

        async function updateWeather() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=33.84&longitude=132.76&current_weather=true&timezone=Asia%2FTokyo`);
                const data = await res.json();
                const codes = { 0: "快晴", 1: "晴れ", 2: "時々曇り", 3: "くもり", 45: "霧", 61: "小雨", 95: "雷雨" };
                document.getElementById('temp-val').textContent = `${data.current_weather.temperature.toFixed(1)}°C`;
                document.getElementById('weather-text').textContent = codes[data.current_weather.weathercode] || "観測中";
            } catch (e) { }
        }

        document.getElementById('soundToggle').onclick = function() {
            if (!audioCtx) audioCtx = new AudioContext();
            isSoundEnabled = !isSoundEnabled;
            this.classList.toggle('active', isSoundEnabled);
            this.textContent = `SOUND: ${isSoundEnabled ? 'ON' : 'OFF'}`;
        };

        const container = document.getElementById('container');
        document.getElementById('tiltToggle').onclick = function() {
            isTiltEnabled = !isTiltEnabled;
            this.classList.toggle('active', isTiltEnabled);
            this.textContent = `3D: ${isTiltEnabled ? 'ON' : 'OFF'}`;
            // OFFにしたときに正面に戻す
            if (!isTiltEnabled) {
                container.style.transform = `rotateX(0deg) rotateY(0deg)`;
            }
        };

        document.addEventListener('mousemove', (e) => {
            if (!isTiltEnabled) return;
            const x = (window.innerWidth / 2 - e.pageX) / 30;
            const y = (window.innerHeight / 2 - e.pageY) / 30;
            // XとYを入れ替えて自然な傾きに調整
            container.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        });

        setInterval(updateClock, 1000);
        updateClock();
        updateWeather();
        function loop() { stars.forEach(s => s.update()); drawMatrix(); requestAnimationFrame(loop); }
        loop();
        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    </script>
</body>
</html>
