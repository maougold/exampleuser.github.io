<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Golden Star Aquarium - Anniversary Edition</title>
    <style>
        :root {
            --gold: #FFD700;
            --gold-dim: rgba(255, 215, 0, 0.3);
            --bg: #0d1117;
        }

        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: var(--bg); display: flex;
            justify-content: center; align-items: center;
            height: 100vh; perspective: 1000px;
            font-family: 'Courier New', Courier, monospace;
        }
        
        #bg { position: absolute; top: 0; left: 0; z-index: -1; opacity: 0.35; }
        
        .fish {
            position: absolute; font-size: 2.2rem;
            transition: transform 0.2s linear;
            pointer-events: none; z-index: -1;
            filter: drop-shadow(0 0 10px var(--gold)) brightness(1.3);
        }

        .clock-container {
            text-align: center; border: 3px solid var(--gold);
            padding: 40px 60px; background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.4);
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            pointer-events: none; backdrop-filter: blur(10px);
        }

        #date { font-size: 1.6rem; color: var(--gold); margin-bottom: 10px; text-shadow: 0 0 10px var(--gold); }
        #clock { font-size: 8rem; font-weight: bold; color: var(--gold); text-shadow: 0 0 30px var(--gold); line-height: 1; }

        .weather-info {
            display: flex; justify-content: center; gap: 40px;
            margin-top: 25px; padding-top: 25px;
            border-top: 1px dashed var(--gold-dim);
            color: var(--gold);
        }
        .info-item { display: flex; flex-direction: column; align-items: center; }
        .label { font-size: 0.8rem; letter-spacing: 2px; opacity: 0.8; margin-bottom: 5px; }
        .val { font-size: 2.2rem; font-weight: bold; color: #fff; text-shadow: 0 0 12px var(--gold); }

        .controls {
            position: absolute; bottom: 30px; right: 30px;
            display: flex; gap: 10px; pointer-events: auto;
        }
        .ui-btn {
            padding: 12px 24px; background: rgba(0,0,0,0.6); color: var(--gold);
            border: 2px solid var(--gold); cursor: pointer; border-radius: 5px;
            font-family: inherit; font-weight: bold; transition: 0.3s; min-width: 130px;
        }
        .ui-btn:hover { background: rgba(255, 215, 0, 0.2); box-shadow: 0 0 20px var(--gold); }
        .ui-btn.active { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <canvas id="bg"></canvas>

    <div class="clock-container" id="container">
        <div id="date">0000/00/00 (---)</div>
        <div id="clock">00:00:00</div>

        <div class="weather-info">
            <div class="info-item"><span class="label">WEATHER</span><span id="weather-text" class="val">--</span></div>
            <div class="info-item"><span class="label">TEMPERATURE</span><span id="temp-val" class="val">--°C</span></div>
        </div>
    </div>

    <div class="controls">
        <button class="ui-btn" id="soundToggle">SOUND: OFF</button>
        <button class="ui-btn" id="tiltToggle">3D: OFF</button>
    </div>

    <script>
        let audioCtx = null;
        let isSoundEnabled = false;
        let isTiltEnabled = false;
        let isStarMode = false; // 星降るモードのフラグ

        // --- 1. ゴールド・フィッシュAI ---
        const fishIcons = ['⭐️', '⭐️', '⭐️', '💛'];
        const fishes = [];
        const numFishes = 12;

        class Fish {
            constructor() {
                this.el = document.createElement('div');
                this.el.className = 'fish';
                this.el.textContent = fishIcons[Math.floor(Math.random() * fishIcons.length)];
                document.body.appendChild(this.el);
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = 0.5 + Math.random() * 1.2;
                this.turnSpeed = (Math.random() - 0.5) * 0.01;
            }
            update() {
                if (this.x < 50 || this.x > window.innerWidth - 50) this.angle = Math.PI - this.angle;
                if (this.y < 50 || this.y > window.innerHeight - 50) this.angle = -this.angle;
                this.angle += this.turnSpeed;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                const isRight = Math.cos(this.angle) > 0;
                const flip = isRight ? 'scaleX(-1)' : 'scaleX(1)';
                const tilt = Math.sin(this.angle) * 15;
                this.el.style.left = `${this.x}px`;
                this.el.style.top = `${this.y}px`;
                this.el.style.transform = `${flip} rotate(${isRight ? -tilt : tilt}deg)`;
            }
        }
        for (let i = 0; i < numFishes; i++) fishes.push(new Fish());

        // --- 2. サウンドシステム ---
        function playTone(freq, duration, volume, type = 'sine') {
            if (!audioCtx || !isSoundEnabled) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // --- 3. 時計の更新 & 星モードの発動 ---
        function updateClock() {
            const now = new Date();
            const days = ['日','月','火','水','木','金','土'];
            document.getElementById('date').textContent = `${now.getFullYear()}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getDate().toString().padStart(2,'0')} (${days[now.getDay()]})`;
            document.getElementById('clock').textContent = now.toTimeString().split(' ')[0];
            
            if (isSoundEnabled) playTone(1500, 0.04, 0.1, 'sine');

            // 毎時00分00秒の判定
            if (now.getMinutes() === 0 && now.getSeconds() === 0) {
                // 星モード ON
                isStarMode = true;
                playTone(880, 0.3, 0.4, 'triangle');
                setTimeout(() => playTone(1760, 0.6, 0.5, 'triangle'), 150);
                
                // 10秒後に元のマトリックスに戻る
                setTimeout(() => { isStarMode = false; }, 10000);
            }
        }

        // --- 4. ゴールド・マトリックス背景（星モード対応） ---
        const canvas = document.getElementById('bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width / 16)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(13, 17, 23, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.font = isStarMode ? "20px serif" : "15px monospace";
            ctx.fillStyle = '#FFD700';

            drops.forEach((y, i) => {
                // 星モードなら「⭐」、通常ならランダムなデジタル文字
                const text = isStarMode ? "⭐" : String.fromCharCode(Math.random() * 128);
                
                // 星の場合は発光感を出す
                if (isStarMode) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = "#FFD700";
                } else {
                    ctx.shadowBlur = 0;
                }

                ctx.fillText(text, i * 16, y * 16);
                if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }

        // --- 5. コントロール ---
        document.getElementById('soundToggle').addEventListener('click', function() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            isSoundEnabled = !isSoundEnabled;
            this.classList.toggle('active', isSoundEnabled);
            this.textContent = `SOUND: ${isSoundEnabled ? 'ON' : 'OFF'}`;
            if (isSoundEnabled) playTone(1000, 0.1, 0.2, 'triangle');
        });

        document.getElementById('tiltToggle').addEventListener('click', function() {
            isTiltEnabled = !isTiltEnabled;
            this.classList.toggle('active', isTiltEnabled);
            this.textContent = `3D: ${isTiltEnabled ? 'ON' : 'OFF'}`;
            if (!isTiltEnabled) document.getElementById('container').style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        document.addEventListener('mousemove', (e) => {
            if (!isTiltEnabled) return;
            const x = (window.innerWidth / 2 - e.pageX) / 25;
            const y = (window.innerHeight / 2 - e.pageY) / 25;
            document.getElementById('container').style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        });

        // 天気
        const weatherCodesJP = { 0: "快晴", 1: "晴れ", 2: "時々曇り", 3: "くもり", 45: "霧", 61: "小雨", 63: "雨", 95: "雷雨" };
        async function updateWeather() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=33.84&longitude=132.76&current_weather=true&timezone=Asia%2FTokyo`);
                const data = await res.json();
                const cw = data.current_weather;
                document.getElementById('temp-val').textContent = `${cw.temperature.toFixed(1)}°C`;
                document.getElementById('weather-text').textContent = weatherCodesJP[cw.weathercode] || "観測中";
            } catch (e) { document.getElementById('weather-text').textContent = "ERR"; }
        }

        setInterval(updateClock, 1000);
        updateClock();
        updateWeather();
        function mainLoop() {
            fishes.forEach(f => f.update());
            drawMatrix();
            requestAnimationFrame(mainLoop);
        }
        mainLoop();
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    </script>
</body>
</html>
