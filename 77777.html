<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SEA SIDE SLOT | GORGEOUS GOLD COMPLETE</title>
    <style>
        /* --- 夏 × ゴージャスゴールド デザイン --- */
        body { 
            background: linear-gradient(135deg, #001f3f 0%, #0074d9 50%, #7fdbff 100%); 
            color: #fff; 
            font-family: 'Impact', 'Arial Black', "Hiragino Sans", sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0;
            overflow: hidden;
            transition: background 1s ease;
        }

        body.golden-mode {
            background: radial-gradient(circle, #fff700 0%, #ff8c00 50%, #b38728 100%);
        }
        
        #money-bar { 
            background: linear-gradient(to bottom, #ffd700, #ff8c00); 
            color: #000; padding: 10px 50px; border-radius: 4px; 
            font-size: 28px; font-weight: 900; margin-bottom: 25px; 
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6), inset 0 0 10px #fff;
            border: 4px solid #fff;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.5);
        }

        #game-layout { display: flex; gap: 15px; align-items: stretch; z-index: 10; }

        #paytable {
            background: rgba(0, 10, 30, 0.85); padding: 15px; border-radius: 4px;
            border: 3px solid #ffd700; 
            width: 230px;
            display: flex; flex-direction: column; 
            box-sizing: border-box;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }
        #paytable h3 { 
            margin: 0 0 10px 0; 
            background: linear-gradient(to right, #ffd700, #fff, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center; font-size: 20px; border-bottom: 2px solid #ffd700;
            flex-shrink: 0;
            letter-spacing: 1px;
        }

        .pay-list { flex-grow: 1; display: flex; flex-direction: column; justify-content: space-around; }
        .pay-row { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            padding: 4px 0;
        }
        .pay-symbol { font-size: 16px; font-weight: bold; letter-spacing: 1px; }
        .pay-value { color: #ffd700; font-weight: bold; font-size: 22px; text-shadow: 0 0 5px #ff4500; }

        #slot-frame {
            background: linear-gradient(145deg, #bf953f, #fcf6ba, #b38728, #fcf6ba, #aa771c); 
            padding: 15px 30px; border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 30px rgba(255, 215, 0, 0.4); 
            position: relative;
            display: flex; align-items: center;
            border: 2px solid #555;
        }

        #reel-area { display: flex; align-items: center; gap: 8px; position: relative; }
        .line-numbers { display: flex; flex-direction: column; justify-content: space-between; height: 320px; font-weight: 900; color: #ffd700; font-size: 18px; text-shadow: 1px 1px 2px #000; }
        
        #reels-grid { 
            display: grid; grid-template-columns: repeat(3, 110px); grid-template-rows: repeat(3, 110px); 
            gap: 10px; background: #000; padding: 10px; border-radius: 4px; position: relative; 
            border: 4px solid #333;
        }
        .cell { 
            width: 110px; height: 110px; 
            background: linear-gradient(to bottom, #fff 0%, #eee 100%); 
            border-radius: 2px; display: flex; align-items: center; justify-content: center; 
            font-size: 65px; position: relative; z-index: 10; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        .wild-text {
            background: linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f00);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbowScroll 2s linear infinite;
            font-weight: 900; font-size: 32px;
        }
        @keyframes rainbowScroll { to { background-position: 200% center; } }

        .bet-line { position: absolute; background: rgba(255, 215, 0, 0.5); pointer-events: none; z-index: 5; box-shadow: 0 0 10px #ffd700; }
        .line-horiz { height: 4px; width: 350px; left: 10px; }
        #line1 { top: 63px; } #line2 { top: 183px; } #line3 { top: 303px; }
        .line-diag { height: 4px; width: 480px; top: 183px; left: -55px; transform-origin: center; }
        #line4 { transform: rotate(45deg); } #line5 { transform: rotate(-45deg); }

        .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .bet-selector { display: flex; gap: 10px; }
        
        .bet-btn { 
            background: #222; border: 2px solid #ffd700;
            padding: 8px 18px; border-radius: 4px; cursor: pointer; font-weight: bold; 
            color: #ffd700; font-size: 16px; transition: 0.2s; 
        }
        .bet-btn.active { 
            background: #ffd700 !important;
            color: #000 !important; 
            box-shadow: 0 0 15px #ffd700;
        }

        #spin-btn { 
            width: 250px; padding: 18px; 
            background: linear-gradient(to bottom, #ff4500, #ff8c00); 
            color: #fff; border: 2px solid #fff; border-radius: 4px; font-size: 26px; font-weight: 900; cursor: pointer; 
            box-shadow: 0 6px 0 #8b0000, 0 10px 20px rgba(0,0,0,0.5);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #spin-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #8b0000; }
        #spin-btn:disabled { background: #555; box-shadow: 0 4px 0 #333; color: #888; border-color: #777; cursor: not-allowed; }
        
        #msg { height: 50px; margin-top: 15px; color: #ffd700; font-weight: 900; font-size: 22px; text-shadow: 2px 2px 5px #000; text-align: center; display: flex; align-items: center; justify-content: center; }

        .line-win-glow { background: #fff !important; box-shadow: 0 0 30px #ffd700, 0 0 60px #fff; height: 8px !important; }
        .win-glow { animation: blink 0.2s infinite alternate; background: #fffde0 !important; z-index: 20; }
        @keyframes blink { 
            from { box-shadow: 0 0 10px #ffd700; transform: scale(1); } 
            to { box-shadow: 0 0 40px #ffd700, inset 0 0 20px #ffd700; transform: scale(1.05); } 
        }
        
        @keyframes bound-stop { 0% { transform: translateY(0); } 20% { transform: translateY(12px); } 100% { transform: translateY(0); } }
        .bound { animation: bound-stop 0.3s ease-out; }
        @keyframes rainbow { 0% { color: #fff; text-shadow: 0 0 10px red; } 50% { color: #ffd700; text-shadow: 0 0 20px gold; } 100% { color: #fff; text-shadow: 0 0 10px blue; } }
        .rainbow-text { animation: rainbow 0.15s linear infinite; font-size: 28px !important; }
    </style>
</head>
<body>

<div id="money-bar">BANK: <span id="balance">1000</span> COINS</div>

<div id="game-layout">
    <div id="paytable">
        <h3 id="panel-title">PAYMENT INFO</h3>
        <div class="pay-list">
            <div class="pay-row"><span class="pay-symbol">7️⃣ 7️⃣ 7️⃣</span> <span class="pay-value">x50</span></div>
            <div class="pay-row"><span class="pay-symbol">🐳 🐳 🐳</span> <span class="pay-value">x20</span></div>
            <div class="pay-row"><span class="pay-symbol">🦈 🦈 🦈</span> <span class="pay-value">x15</span></div>
            <div class="pay-row"><span class="pay-symbol">🍉 🍉 🍉</span> <span class="pay-value">x10</span></div>
            <div class="pay-row"><span class="pay-symbol">🐙 🐙 🐙</span> <span class="pay-value">x5</span></div>
            <div class="pay-row"><span class="pay-symbol">🦐 🦐 🦐</span> <span class="pay-value">x3</span></div>
        </div>
        <p id="sub-msg" style="font-size: 11px; color: #aaa; margin-top: 10px; text-align: center;">
            5-LINES VALID SYSTEM<br>
            SUMMER GORGEOUS EDITION
        </p>
    </div>

    <div id="slot-container">
        <div id="slot-frame">
            <div id="reel-area">
                <div class="line-numbers"><div>1</div><div>4</div><div>2</div><div>5</div><div>3</div></div>
                <div id="reels-grid">
                    <div class="bet-line line-horiz" id="line1"></div>
                    <div class="bet-line line-horiz" id="line2"></div>
                    <div class="bet-line line-horiz" id="line3"></div>
                    <div class="bet-line line-diag" id="line4"></div>
                    <div class="bet-line line-diag" id="line5"></div>
                    <div class="cell" id="c0">🏖️</div><div class="cell" id="c1">🏖️</div><div class="cell" id="c2">🏖️</div>
                    <div class="cell" id="c3">🏖️</div><div class="cell" id="c4">🏖️</div><div class="cell" id="c5">🏖️</div>
                    <div class="cell" id="c6">🏖️</div><div class="cell" id="c7">🏖️</div><div class="cell" id="c8">🏖️</div>
                </div>
                <div class="line-numbers"><div>1</div><div>5</div><div>2</div><div>4</div><div>3</div></div>
            </div>
        </div>

        <div class="controls">
            <div class="bet-selector">
                <button class="bet-btn" id="btn-bet10" onclick="setBet(10)">10 / LINE</button>
                <button class="bet-btn active" id="btn-bet100" onclick="setBet(100)">100 / LINE</button>
                <button class="bet-btn" id="btn-bet500" onclick="setBet(500)">500 / LINE</button>
            </div>
            <div style="font-size: 18px; color: #ffd700; font-weight: bold; text-shadow: 1px 1px 2px #000;">TOTAL BET: <span id="total-bet">500</span></div>
            <button id="spin-btn" onclick="spin()">SPIN START</button>
        </div>
        <div id="msg">アツい夏にするにゃ！</div>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq, type, duration, vol = 0.1) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }
    
    const sounds = {
        bet: () => playSound(880, 'sine', 0.1),
        click: () => playSound(440, 'square', 0.05, 0.05),
        reel: () => playSound(150, 'triangle', 0.05, 0.02),
        win: () => [523, 659, 783, 1046].forEach((f, i) => setTimeout(() => playSound(f, 'square', 0.4, 0.05), i * 150)),
        // 【追加】キュイン！音
        kyuin: () => [2093, 2637, 2093, 2637].forEach((f, i) => setTimeout(() => playSound(f, 'sine', 0.15, 0.12), i * 100))
    };

    const symbols = ['7️⃣', '🐳', '🦈', '🍉', '🐙', '🦐', '🏖️'];
    const multipliers = { '7️⃣': 50, '🐳': 20, '🦈': 15, '🍉': 10, '🐙': 5, '🦐': 3, '🏖️': 0 };
    const lineIndices = [[0,1,2],[3,4,5],[6,7,8],[0,4,8],[2,4,6]];
    let balance = parseInt(localStorage.getItem('ev_coin_balance')) || 1000;
    let currentBetPerLine = 100;

    let isHighChance = false;
    let bonusEndTime = 0; 
    let ebiCounter = 0;   
    let suikaCounter = 0; 

    function updateMode() {
        const now = new Date();
        const currentTime = now.getHours() * 100 + now.getMinutes();
        const targets = [950, 1033, 1050, 1155, 1234, 1355, 1511, 1811, 1831, 1955, 2031, 2055, 2111, 2230, 2310, 2323, 2358, 123];
        
        let isTimeActive = targets.some(t => currentTime >= t && currentTime <= t + 1);
        let isBonusActive = Date.now() < bonusEndTime;
        const active = isTimeActive || isBonusActive;

        if (active && !isHighChance) {
            isHighChance = true;
            document.body.classList.add('golden-mode');
            document.getElementById('panel-title').innerText = "GOLDEN TIME";
            document.getElementById('msg').innerText = "✨高確率ゾーン突入だにゃ！✨";
        } else if (!active && isHighChance) {
            isHighChance = false;
            document.body.classList.remove('golden-mode');
            document.getElementById('panel-title').innerText = "PAYMENT INFO";
        }
    }
    setInterval(updateMode, 1000);

    function setBet(amount) {
        sounds.bet(); currentBetPerLine = amount;
        document.getElementById('total-bet').innerText = amount * 5;
        document.querySelectorAll('.bet-btn').forEach(btn => btn.classList.toggle('active', btn.id === `btn-bet${amount}`));
    }

    function updateBalance(amount) { 
        balance += amount; 
        document.getElementById('balance').innerText = balance.toLocaleString(); 
        localStorage.setItem('ev_coin_balance', balance); 
    }

    async function spin() {
        const totalBet = currentBetPerLine * 5;
        if (balance < totalBet) { document.getElementById('msg').innerText = "コイン不足だにゃ！"; return; }
        updateBalance(-totalBet);
        const spinBtn = document.getElementById('spin-btn');
        const msgEl = document.getElementById('msg');
        spinBtn.disabled = true;
        msgEl.innerText = isHighChance ? "黄金の波が来てるにゃ！" : "波に乗るにゃ〜…"; 
        msgEl.classList.remove('rainbow-text');
        
        for(let i=0; i<9; i++) {
            const cell = document.getElementById(`c${i}`);
            cell.classList.remove('win-glow', 'bound');
            cell.innerHTML = cell.innerText; 
        }
        for(let i=1; i<=5; i++) document.getElementById(`line${i}`).classList.remove('line-win-glow');
        
        const isOkure = Math.random() < 0.05;
        sounds.click();
        setTimeout(() => {
            const reelSnd = setInterval(() => sounds.reel(), 100);
            const spinEff = setInterval(() => {
                for(let i=0; i<9; i++) {
                    if (isHighChance && i === 4) {
                        document.getElementById(`c${i}`).innerHTML = '<span class="wild-text">WILD</span>';
                    } else {
                        document.getElementById(`c${i}`).innerText = symbols[Math.floor(Math.random() * symbols.length)];
                    }
                }
            }, 80);
            setTimeout(() => { clearInterval(spinEff); clearInterval(reelSnd); finishSpin(); }, 1200);
        }, isOkure ? 300 : 0);
    }

    function finishSpin() {
        const results = [];
        for(let i=0; i<9; i++) {
            let s;
            if (isHighChance && i === 4) {
                s = "WILD";
                document.getElementById(`c4`).innerHTML = '<span class="wild-text">WILD</span>';
            } else {
                let pool = isHighChance ? ['7️⃣', '🐳', '🦈', '🍉', '🐙', '🦐', '7️⃣', '🐳'] : [...symbols];
                s = pool[Math.floor(Math.random() * pool.length)];
                document.getElementById(`c${i}`).innerText = s;
            }
            results.push(s);
        }

        let totalWin = 0;
        let isBigWin = false;
        let triggeredBonus = false;

        lineIndices.forEach((line, index) => {
            const [a, b, c] = line;
            const lineSymbols = [results[a], results[b], results[c]];
            const activeSymbols = lineSymbols.filter(s => s !== "WILD");
            const uniqueSymbols = [...new Set(activeSymbols)];

            if ((uniqueSymbols.length === 1 && uniqueSymbols[0] !== '🏖️') || (activeSymbols.length === 0)) {
                const s = uniqueSymbols[0] || '7️⃣'; 
                totalWin += currentBetPerLine * multipliers[s];
                document.getElementById(`line${index + 1}`).classList.add('line-win-glow');
                line.forEach(idx => {
                    document.getElementById(`c${idx}`).classList.add('win-glow');
                    if (s === '7️⃣' || s === '🐳') { 
                        document.getElementById(`c${idx}`).classList.add('bound'); 
                        isBigWin = true; 
                    }
                });

                if (s === '🦐') {
                    ebiCounter++;
                    if (ebiCounter >= 7) {
                        bonusEndTime = Math.max(bonusEndTime, Date.now()) + 60000;
                        ebiCounter = 0; triggeredBonus = true;
                    }
                }
                if (s === '🍉') {
                    suikaCounter++;
                    if (suikaCounter >= 5) {
                        bonusEndTime = Math.max(bonusEndTime, Date.now()) + 90000;
                        suikaCounter = 0; triggeredBonus = true;
                    }
                }
            }
        });

        const msgEl = document.getElementById('msg');
        if (totalWin > 0) {
            sounds.win();
            // 【演出】ボーナス発動時はキュイン音！
            if (triggeredBonus) {
                setTimeout(() => {
                    sounds.kyuin();
                    msgEl.innerText = "🚨キュイン！超高確率突入🚨";
                    msgEl.classList.add('rainbow-text');
                }, 600);
            } else {
                msgEl.innerText = `✨ ${totalWin} COINS GET!! ✨`;
                if (isBigWin) msgEl.classList.add('rainbow-text');
            }
            updateBalance(totalWin);
        } else { 
            msgEl.innerText = isHighChance ? "次こそ大当たりの予感！" : "波が来なかったにゃ…"; 
        }
        document.getElementById('spin-btn').disabled = false;
    }
    updateBalance(0);
</script>
</body>
</html>
